[pytest]
# ===========================================================================
# VORTEX — конфигурация pytest
# Положи этот файл в корень проекта: /Vortex/pytest.ini
# ===========================================================================

# ---------------------------------------------------------------------------
# Пути и обнаружение тестов
# ---------------------------------------------------------------------------
testpaths =
    app/tests

python_files  = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Режим asyncio (для async тестов)
# ---------------------------------------------------------------------------
asyncio_mode = auto

# ---------------------------------------------------------------------------
# Вывод
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -ra
    --color=yes
    --durations=10

# ---------------------------------------------------------------------------
# Маркеры (используй как: @pytest.mark.slow)
# ---------------------------------------------------------------------------
markers =
    slow:       тесты которые выполняются > 1 сек
    crypto:     тесты крипто-ядра (AES, ECIES, SHA-256)
    auth:       тесты аутентификации
    rooms:      тесты комнат
    files:      тесты загрузки файлов
    websocket:  тесты WebSocket
    security:   тесты безопасности (WAF, SQLi, XSS, CSRF)
    metrics:    замеры производительности
    integration: сквозные интеграционные тесты

# ---------------------------------------------------------------------------
# Переменные окружения для тестов
# ---------------------------------------------------------------------------
env =
    TESTING=true
    DB_PATH=:file::memory:?cache=shared:
    JWT_SECRET=test_secret_key_minimum_32_chars_long_1234
    CSRF_SECRET=test_csrf_secret_minimum_32_chars_1234567
    NODE_INITIALIZED=true
    DEVICE_NAME=TestNode
    PORT=8001
    HOST=127.0.0.1
    UDP_PORT=4201
    MAX_FILE_MB=100
    WAF_RATE_LIMIT_REQUESTS=9999

# ---------------------------------------------------------------------------
# Логирование во время тестов
# ---------------------------------------------------------------------------
log_cli       = true
log_cli_level = WARNING
log_format    = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# ---------------------------------------------------------------------------
# Игнорировать предупреждения от сторонних библиотек
# ---------------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning