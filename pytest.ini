[pytest]
# ===========================================================================
# VORTEX — pytest configuration
# ===========================================================================

# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths =
    app/tests

python_files  = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Async mode
# ---------------------------------------------------------------------------
asyncio_mode = auto

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -ra
    --color=yes
    --durations=10
    --timeout=30
    -n 30

# ---------------------------------------------------------------------------
# Markers
# ---------------------------------------------------------------------------
markers =
    slow:        tests that take > 1 sec
    crypto:      crypto core tests (AES, ECIES, SHA-256)
    auth:        authentication tests
    rooms:       room tests
    files:       file upload tests
    websocket:   WebSocket tests
    security:    security tests (WAF, SQLi, XSS, CSRF)
    metrics:     performance benchmarks
    integration: end-to-end integration tests

# ---------------------------------------------------------------------------
# Logging during tests
# ---------------------------------------------------------------------------
log_cli       = true
log_cli_level = WARNING
log_format    = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# ---------------------------------------------------------------------------
# Ignore warnings from third-party libs
# ---------------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:fastapi.*
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
