<!-- Create Room + Folders + Hidden (SRP: room creation modals) -->
<div class="modal-overlay" id="status-editor-modal" role="dialog" aria-modal="true" aria-label="Set Status">
    <div class="modal">
        <div class="modal-title" data-i18n="status.setStatus">Set Status</div>
        <div class="status-editor">
            <div class="status-editor-row">
                <button class="status-emoji-btn" id="status-emoji-pick" onclick="window._cycleStatusEmoji()" title="Choose emoji">😊</button>
                <input class="status-text-input" id="status-text-input" type="text"
                       maxlength="70" placeholder="What's your status?" data-i18n-placeholder="status.placeholder"
                       oninput="window._updateStatusCharCount()">
            </div>
            <div class="status-char-count"><span id="status-char-num">0</span>/70</div>
            <div class="status-emoji-presets" id="status-emoji-presets">
                <button onclick="window._pickStatusEmoji('😊')">😊</button>
                <button onclick="window._pickStatusEmoji('🏠')">🏠</button>
                <button onclick="window._pickStatusEmoji('🎯')">🎯</button>
                <button onclick="window._pickStatusEmoji('🎧')">🎧</button>
                <button onclick="window._pickStatusEmoji('💻')">💻</button>
                <button onclick="window._pickStatusEmoji('📱')">📱</button>
                <button onclick="window._pickStatusEmoji('🍕')">🍕</button>
                <button onclick="window._pickStatusEmoji('✈️')">✈️</button>
                <button onclick="window._pickStatusEmoji('🌙')">🌙</button>
                <button onclick="window._pickStatusEmoji('🔴')">🔴</button>
                <button onclick="window._pickStatusEmoji('🤒')">🤒</button>
                <button onclick="window._pickStatusEmoji('📚')">📚</button>
            </div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px;" data-i18n="status.presence">Presence</div>
            <div class="presence-presets" id="presence-presets">
                <button class="presence-btn active" data-presence="online" onclick="window._pickPresence('online')">
                    <span class="pdot online"></span> Online
                </button>
                <button class="presence-btn" data-presence="away" onclick="window._pickPresence('away')">
                    <span class="pdot away"></span> Away
                </button>
                <button class="presence-btn" data-presence="dnd" onclick="window._pickPresence('dnd')">
                    <span class="pdot dnd"></span> DND
                </button>
                <button class="presence-btn" data-presence="invisible" onclick="window._pickPresence('invisible')">
                    <span class="pdot invisible"></span> Invisible
                </button>
            </div>
        </div>
        <div class="modal-actions" style="margin-top:16px;">
            <button class="btn btn-secondary btn-sm" onclick="window._clearRichStatus()" data-i18n="status.clear">Clear</button>
            <button class="btn btn-primary" onclick="window._saveRichStatus()" data-i18n="status.save">Save</button>
            <button class="btn btn-secondary" onclick="closeModal('status-editor-modal')" data-i18n="app.close">Close</button>
        </div>
    </div>
</div>

<!-- Модалка: создание голосового канала -->

<div id="call-overlay">
    <!-- Top bar: minimize + timer + quality -->

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.5 3.09L15 7.59V4h-2v7h7V9h-3.59l4.5-4.5-1.41-1.41zM4 13v2h3.59l-4.5 4.5 1.41 1.41 4.5-4.5V20h2v-7H4z"/>
            </svg>
        </button>
        <div class="call-topbar-center">
            <div class="call-timer" id="call-overlay-timer">0:00</div>
            <div class="call-encrypt-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <span data-i18n="call.encrypted">E2E</span>

        </div>
        <div style="width:38px"></div>

    <!-- Video area: main + PIP (swappable) -->
    <div class="call-video-area" id="call-video-area">
        <div class="call-main-video-wrap" id="call-main-wrap" onclick="swapCallVideos()">
            <video id="remote-video" autoplay playsinline></video>
            <div class="call-avatar call-avatar-main" id="call-peer-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
        <div class="call-pip-video-wrap" id="call-pip-wrap" onclick="swapCallVideos()">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="call-avatar call-avatar-pip" id="call-local-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
    </div>

    <!-- Peer info (shown when no video) -->
    <div class="call-peer-info" id="call-peer-info">
        <div class="call-name" id="call-peer-name">—</div>
        <div class="call-status" id="call-status" data-i18n="call.calling">Вызов...</div>
    </div>

    <!-- Controls -->
    <div class="call-controls">
        <button class="call-btn" id="mute-btn" onclick="toggleMute()" data-i18n-title="call.muteMic">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M16 12V6c0-2.21-1.79-4-4-4S8 3.79 8 6v6c0 2.21 1.79 4 4 4s4-1.79 4-4m-6 0V6c0-1.1.9-2 2-2s2 .9 2 2v6c0 1.1-.9 2-2 2s-2-.9-2-2"></path><path d="M18 12c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.07 3.06 7.44 7 7.93V22h2v-2.07c3.94-.49 7-3.86 7-7.93z"></path>
            </svg>
            <span class="call-btn-label" data-i18n="call.muteMic">Микрофон</span>
        </button>
        <button class="call-btn" id="cam-btn" onclick="toggleCam()" data-i18n-title="call.camera">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
            </svg>
            <span class="call-btn-label" data-i18n="call.camera">Камера</span>
        </button>
        <button class="call-btn" id="screen-btn" onclick="toggleScreenShare()" data-i18n-title="call.screenShare">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H1v2h22v-2h-3ZM4 6h16v10H4V6Z"/>
            </svg>
            <span class="call-btn-label" data-i18n="call.screenShare">Экран</span>
        </button>
        <button class="call-btn call-btn-hangup" onclick="hangup()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.99.99 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28a11.27 11.27 0 0 0-2.67-1.85.996.996 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
            </svg>
            <span class="call-btn-label" data-i18n="notifications.decline">Завершить</span>
        </button>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     MINI APP PANEL — Sandboxed iframe overlay for bot web apps
     Similar to Telegram Mini Apps: bots specify a URL, it opens in-app.
     Communication via postMessage bridge.
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="miniapp-panel">
    <div class="miniapp-header">
        <button class="miniapp-back-btn" onclick="closeMiniApp()" title="Back" data-i18n-title="miniapp.back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="miniapp-title" id="miniapp-title">Mini App</span>
        <span class="miniapp-bot-badge">MINI APP</span>
        <button class="miniapp-expand-btn" id="miniapp-expand-btn" onclick="toggleMiniAppExpand()" title="Fullscreen" data-i18n-title="miniapp.fullscreen">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3"/><path d="M21 8V5a2 2 0 00-2-2h-3"/><path d="M3 16v3a2 2 0 002 2h3"/><path d="M16 21h3a2 2 0 002-2v-3"/></svg>
        </button>
        <button class="miniapp-close-btn" onclick="closeMiniApp()" title="Close" data-i18n-title="miniapp.close">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
    </div>
    <div class="miniapp-loading" id="miniapp-loading">
        <div class="spinner"></div>
        <span data-i18n="miniapp.loading">Loading Mini App...</span>
    </div>
    <iframe id="miniapp-frame"
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups"
            allow="camera;microphone;geolocation"
            style="width:100%;flex:1;border:none;display:none;">
    </iframe>
</div>

<div id="file-preview-overlay" onclick="closeDotMenu()">

    <div class="fpo-topbar" onclick="event.stopPropagation()">
        <button class="fpo-close-btn" onclick="cancelFilePreview()">←</button>
        <span class="fpo-title" id="fpo-filename">—</span>
        <div class="fpo-dots-wrap">
            <button class="fpo-dots-btn" id="fpo-dots-btn"
                    onclick="toggleDotMenu(); event.stopPropagation()"
                    title="Ещё" data-i18n-title="app.more">⋮</button>
            <div class="fpo-dot-menu" id="fpo-dot-menu" onclick="event.stopPropagation()">
                <div class="fpo-dot-item" onclick="sendWithoutCompression()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> <span data-i18n="file.sendUncompressed">Отправить без сжатия</span>
                </div>
            </div>
        </div>
    </div>
    <div class="fpo-preview" onclick="event.stopPropagation()">
        <img id="preview-img" src="" alt="" style="display:none;">
        <div id="preview-file-card" class="fpo-file-card" style="display:none;">
            <span id="fpo-file-icon" class="fpo-file-icon"></span>
            <div>
                <div id="fpo-file-name" class="fpo-file-name-card">—</div>
                <div id="fpo-file-size" class="fpo-file-size-card">—</div>
            </div>
        </div>
    </div>

    <div id="compress-section" style="display:none;" onclick="event.stopPropagation()">
        <div class="compress-header">
            <span class="compress-label" data-i18n="file.size">Размер</span>
            <span class="compress-meta">
                <span id="compress-dims">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          fill="currentColor" viewBox="0 0 24 24" >
                            <path d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z"></path>
                    </svg>
                    </span>
                <span class="compress-sep">·</span>
                <span id="compress-pct">100%</span>
            </span>
        </div>
        <div class="compress-track">
            <input type="range" id="compress-slider"
                   min="10" max="100" value="100" step="5"
                   oninput="onCompressSlider(this.value)">
        </div>
        <div class="compress-hints">
            <span data-i18n="file.smaller">10% — меньше</span>
            <span data-i18n="file.original">100% — оригинал</span>
        </div>
    </div>

    <div id="fpo-error" style="display:none;font-size:12px;color:var(--red);font-family:var(--mono);padding:6px 24px;text-align:center;"></div>

    <div class="fpo-bottom-bar" id="fpo-bottom-bar" onclick="event.stopPropagation()">
        <div class="fpo-meta">
            <span class="fpo-meta-size" id="fpo-filesize">—</span>
        </div>
        <div class="fpo-actions">
            <button class="fpo-cancel-btn" id="fpo-cancel-btn"
                    onclick="cancelFilePreview()" data-i18n="app.cancel">Отмена</button>
            <button class="fpo-send-btn" id="fpo-send-btn"
                    onclick="sendPendingFile()">
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                      fill="currentColor" viewBox="0 0 24 24" >
                    <path d="M12 2C6.49 2 2 6.49 2 12c0 2.12.68 4.19 1.93 5.9l-1.75 2.53c-.21.31-.24.7-.06 1.03.17.33.51.54.89.54h9c5.51 0 10-4.49 10-10S17.51 2 12 2m0 18H4.91L6 18.43c.26-.37.23-.88-.06-1.22A7.98 7.98 0 0 1 4.01 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8Z"></path>
                </svg>
                <span data-i18n="chat.send">Отправить</span>
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="saved-modal" role="dialog" aria-modal="true" aria-label="Избранное">
    <div class="modal" style="width:500px;max-height:80vh;display:flex;flex-direction:column;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/>
            </svg>
            <span data-i18n="nav.saved">Избранное</span>

        <div id="saved-list" style="flex:1;overflow-y:auto;max-height:55vh;min-height:80px;"></div>
        <div class="modal-actions">

<div class="modal-overlay" id="tasks-modal" role="dialog" aria-modal="true" aria-label="Задачи">
    <div class="modal" style="width:500px;max-height:80vh;display:flex;flex-direction:column;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                <path d="M22 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm0 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm-10.29-3.29l-3 3a.996.996 0 01-1.41 0l-1.5-1.5a.996.996 0 111.41-1.41l.79.79 2.29-2.29a.996.996 0 111.41 1.41zm0-8l-3 3a.996.996 0 01-1.41 0l-1.5-1.5a.996.996 0 011.41-1.41l.79.79 2.29-2.29c.39-.39 1.02-.39 1.41 0 .4.39.4 1.02.01 1.41z"/>
            </svg>
            <span data-i18n="tasks.title">Задачи</span>
        </div>
        <div class="task-input-row">
            <input class="form-input" id="task-text-input" placeholder="Новая задача..." data-i18n-placeholder="tasks.newTask"
                   maxlength="500" style="flex:1;"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();addTask();}">
            <select class="form-input task-assignee-select" id="task-assignee-select" title="Ответственный" data-i18n-title="tasks.assignee">
                <option value="" data-i18n="tasks.noAssignee">-- нет --</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="addTask()" style="white-space:nowrap;" data-i18n="tasks.add">+ Добавить</button>
        </div>
        <div id="tasks-list" style="flex:1;overflow-y:auto;max-height:55vh;min-height:80px;"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('tasks-modal')" data-i18n="app.close">Закрыть</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="add-peer-modal" role="dialog" aria-modal="true" aria-label="Добавить пир">
    <div class="modal" style="width:420px;">
        <div class="modal-title" data-i18n="nav.addNode">Добавить узел</div>
        <div id="add-peer-alert" class="alert"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="peers.nodeAddress">Адрес узла</label>
            <input class="form-input" id="peer-address" placeholder="192.168.1.100:8000 или domain.com:8000" data-i18n-placeholder="peers.addressPlaceholder">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('add-peer-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="addGlobalPeer()" data-i18n="peers.connect">Подключиться</button>
        </div>
    </div>
</div>

<!-- Модалка создания/редактирования папки -->
<div class="modal-overlay" id="folder-modal" role="dialog" aria-modal="true" aria-label="Управление папкой" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
    <div class="modal" style="width:340px;">
        <div class="modal-title" id="folder-modal-title" data-i18n="folders.newFolder">Новая папка</div>
        <div class="folder-modal-inner">
            <input class="form-input" id="folder-name-input" type="text" placeholder="Название папки..." data-i18n-placeholder="folders.namePlaceholder" aria-label="Название папки" autocomplete="off" maxlength="20">
            <div style="font-size:12px;color:var(--text3);font-family:var(--sans);" data-i18n="folders.color">Цвет</div>
            <div class="folder-color-picker" id="folder-color-picker"></div>
            <div id="folder-modal-error" style="color:var(--red);font-size:12px;min-height:18px;"></div>
            <div style="display:flex;gap:8px;margin-top:4px;">
                <button class="btn btn-primary" id="folder-modal-ok" data-i18n="app.create">Создать</button>
                <button class="btn btn-secondary" onclick="window.closeFolderModal()" data-i18n="app.cancel">Отмена</button>
            </div>
        </div>
    </div>
</div>
