<!-- Story Creator Modal -->
<div class="modal-overlay" id="story-create-modal" role="dialog" aria-modal="true" aria-label="Создать сторис" style="display:none;z-index:3000;">
    <div class="modal" style="width:420px;max-height:90vh;overflow-y:auto;">

        <!-- Step 1: Choose type -->
        <div id="sc-step-type">
            <div class="modal-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                <span data-i18n="stories.addStory">Создать сторис</span>
            </div>
            <div class="sc-type-grid">
                <button class="sc-type-btn" onclick="window._scSelectType('camera-photo')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg></div>
                    <span data-i18n="stories.editorCamera">Камера</span>
                </button>
                <button class="sc-type-btn" onclick="window._scSelectType('camera-video')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></div>
                    <span data-i18n="stories.editorVideo">Видео</span>
                </button>
                <button class="sc-type-btn" onclick="window._scSelectType('photo')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="m21 19-1.41-1.41L5 4H3v2l14.59 14.59zM19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM5 15l3.5-4.5 2.5 3.01L14.5 9l4.5 6H5z"/></svg></div>
                    <span data-i18n="stories.editorPhoto">Фото из галереи</span>
                </button>
                <button class="sc-type-btn" onclick="window._scSelectType('video')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
                    <span data-i18n="stories.editorVideo">Видео из галереи</span>
                </button>
                <button class="sc-type-btn" onclick="window._scSelectType('text')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/></svg></div>
                    <span data-i18n="stories.editorText">Текст</span>
                </button>
                <button class="sc-type-btn" onclick="window._scSelectType('music')">
                    <div class="sc-type-icon"><svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                    <span data-i18n="stories.editorMusic">Музыка</span>
                </button>
            </div>
        </div>

        <!-- Step 2: Editor -->
        <div id="sc-step-editor" style="display:none;">
            <div class="modal-title">
                <button class="btn btn-secondary" style="padding:4px 10px;font-size:12px;" onclick="window._scBack()" data-i18n="stories.editor">← Назад</button>
                <span id="sc-editor-title" data-i18n="stories.editor">Редактор</span>
            </div>

            <!-- Camera preview -->
            <div id="sc-camera-wrap" style="display:none;position:relative;">
                <video id="sc-camera-stream" autoplay playsinline muted style="width:100%;border-radius:12px;max-height:320px;object-fit:cover;background:#000;"></video>
                <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
                    <button class="btn btn-primary" id="sc-capture-btn" onclick="window._scCapture()">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
                        <span data-i18n="stories.editorCamera">Сфотать</span>
                    </button>
                    <button class="btn btn-secondary" id="sc-record-btn" onclick="window._scToggleCamRecord()">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                        <span data-i18n="stories.startRecording">Записать</span>
                    </button>
                </div>
            </div>

            <!-- Preview of selected media -->
            <div id="sc-preview-wrap" style="display:none;text-align:center;position:relative;">
                <img id="sc-preview-img" style="display:none;max-width:100%;border-radius:12px;max-height:300px;object-fit:contain;" alt="">
                <video id="sc-preview-video" style="display:none;max-width:100%;border-radius:12px;max-height:300px;" controls></video>
            </div>

            <!-- Text story editor -->
            <div id="sc-text-editor" style="display:none;">
                <div id="sc-text-preview" class="sc-text-preview" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
                    <p id="sc-text-preview-content" style="color:#fff;font-size:22px;font-weight:600;text-align:center;word-break:break-word;padding:16px;"></p>
                </div>
                <div class="form-group" style="margin-top:10px;">
                    <label class="form-label" data-i18n="stories.editorText">Текст</label>
                    <textarea class="form-input" id="sc-text-input" rows="3" maxlength="200" placeholder="Введите текст..."
                        oninput="window._scUpdateTextPreview()"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="settings.accentColor">Цвет текста</label>
                    <div class="sc-color-row" id="sc-text-colors">
                        <button class="sc-color-dot active" style="background:#fff;" data-color="#ffffff" onclick="window._scSetTextColor('#ffffff',this)"></button>
                        <button class="sc-color-dot" style="background:#000;" data-color="#000000" onclick="window._scSetTextColor('#000000',this)"></button>
                        <button class="sc-color-dot" style="background:#ffde03;" data-color="#ffde03" onclick="window._scSetTextColor('#ffde03',this)"></button>
                        <button class="sc-color-dot" style="background:#ff6b6b;" data-color="#ff6b6b" onclick="window._scSetTextColor('#ff6b6b',this)"></button>
                        <button class="sc-color-dot" style="background:#4ecdc4;" data-color="#4ecdc4" onclick="window._scSetTextColor('#4ecdc4',this)"></button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="settings.chatBackground">Фон</label>
                    <div class="sc-color-row" id="sc-bg-colors">
                        <button class="sc-bg-dot active" style="background:linear-gradient(135deg,#667eea,#764ba2);" data-bg="linear-gradient(135deg,#667eea 0%,#764ba2 100%)" onclick="window._scSetBg('linear-gradient(135deg,#667eea 0%,#764ba2 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#f093fb,#f5576c);" data-bg="linear-gradient(135deg,#f093fb 0%,#f5576c 100%)" onclick="window._scSetBg('linear-gradient(135deg,#f093fb 0%,#f5576c 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" data-bg="linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)" onclick="window._scSetBg('linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#43e97b,#38f9d7);" data-bg="linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)" onclick="window._scSetBg('linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#fa709a,#fee140);" data-bg="linear-gradient(135deg,#fa709a 0%,#fee140 100%)" onclick="window._scSetBg('linear-gradient(135deg,#fa709a 0%,#fee140 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:#1a1a2e;" data-bg="#1a1a2e" onclick="window._scSetBg('#1a1a2e',this)"></button>
                    </div>
                </div>
            </div>

            <!-- Duration (photo/text) -->
            <div class="form-group" id="sc-duration-group" style="display:none;">
                <label class="form-label">Длительность: <span id="sc-duration-label">5с</span></label>
                <input type="range" id="sc-duration-input" min="3" max="30" value="5"
                    oninput="document.getElementById('sc-duration-label').textContent=this.value+'с'"
                    style="width:100%;accent-color:var(--accent);">
            </div>

            <!-- Text overlay on media -->
            <div class="form-group" id="sc-overlay-group" style="display:none;">
                <label class="form-label" data-i18n="stories.editorText">Текст поверх (необязательно)</label>
                <input class="form-input" id="sc-overlay-text" maxlength="100" placeholder="Добавить текст...">
            </div>

            <!-- Music -->
            <div class="form-group">
                <label class="form-label" data-i18n="stories.editorMusic">Музыка (необязательно)</label>
                <div style="display:flex;gap:8px;">
                    <input class="form-input" id="sc-music-title" maxlength="80" placeholder="Название трека..." style="flex:1;">
                    <label class="btn btn-secondary" style="cursor:pointer;white-space:nowrap;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                        <span data-i18n="roomMedia.file">Файл</span>
                        <input type="file" id="sc-music-file" accept="audio/*" style="display:none;" onchange="window._scMusicFileChange(this)">
                    </label>
                </div>
                <div id="sc-music-preview" style="font-size:12px;color:var(--accent);margin-top:4px;display:none;"></div>
            </div>

            <!-- Hidden file inputs -->
            <input type="file" id="sc-photo-file" accept="image/*" style="display:none;" onchange="window._scMediaFileChange(this,'photo')">
            <input type="file" id="sc-video-file" accept="video/*" style="display:none;" onchange="window._scMediaFileChange(this,'video')">
            <canvas id="sc-canvas" style="display:none;"></canvas>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="window.closeStoryCreator()" data-i18n="app.cancel">Отмена</button>
                <button class="btn btn-primary" onclick="window._scPublish()" id="sc-publish-btn" data-i18n="stories.publish">Опубликовать</button>
            </div>
        </div>

    </div>
</div>
