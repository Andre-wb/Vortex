<!-- Story Creator — Fullscreen Page -->
<div id="story-create-modal" class="sc-fullscreen" style="display:none;">

    <!-- Step 1: Choose type -->
    <div id="sc-step-type" class="sc-page">
        <div class="sc-header">
            <button class="sc-close-btn" onclick="window.closeStoryCreator()">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <h2 class="sc-title" data-i18n="stories.addStory">New Story</h2>
            <div style="width:40px;"></div>
        </div>

        <div class="sc-type-grid">
            <button class="sc-type-btn" onclick="window._scSelectType('camera-photo')">
                <div class="sc-type-icon sc-icon-camera">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8a3.2 3.2 0 0 1 0 6.4M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/></svg>
                </div>
                <span data-i18n="stories.editorCamera">Camera</span>
            </button>
            <button class="sc-type-btn" onclick="window._scSelectType('camera-video')">
                <div class="sc-type-icon sc-icon-video">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </div>
                <span data-i18n="stories.editorVideo">Video</span>
            </button>
            <button class="sc-type-btn" onclick="window._scSelectType('photo')">
                <div class="sc-type-icon sc-icon-photo">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </div>
                <span data-i18n="stories.editorPhoto">Gallery</span>
            </button>
            <button class="sc-type-btn" onclick="window._scSelectType('video')">
                <div class="sc-type-icon sc-icon-gallery">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V4h-4z"/></svg>
                </div>
                <span>Video file</span>
            </button>
            <button class="sc-type-btn" onclick="window._scSelectType('text')">
                <div class="sc-type-icon sc-icon-text">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/></svg>
                </div>
                <span data-i18n="stories.editorText">Text</span>
            </button>
            <button class="sc-type-btn" onclick="window._scSelectType('music')">
                <div class="sc-type-icon sc-icon-music">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                </div>
                <span data-i18n="stories.editorMusic">Music</span>
            </button>
        </div>
    </div>

    <!-- Step 2: Editor -->
    <div id="sc-step-editor" class="sc-page" style="display:none;">
        <div class="sc-header">
            <button class="sc-close-btn" onclick="window._scBack()">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <h2 class="sc-title" id="sc-editor-title" data-i18n="stories.editor">Editor</h2>
            <button class="sc-publish-btn" onclick="window._scPublish()" id="sc-publish-btn" data-i18n="stories.publish">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <div class="sc-editor-body">
            <!-- Camera preview -->
            <div id="sc-camera-wrap" class="sc-media-area" style="display:none;">
                <video id="sc-camera-stream" autoplay playsinline muted class="sc-media-preview"></video>
                <div class="sc-camera-controls">
                    <button class="sc-camera-btn sc-capture" id="sc-capture-btn" onclick="window._scCapture()">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                    </button>
                    <button class="sc-camera-btn sc-record" id="sc-record-btn" onclick="window._scToggleCamRecord()" style="display:none;">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                    </button>
                </div>
            </div>

            <!-- Preview of selected media -->
            <div id="sc-preview-wrap" class="sc-media-area" style="display:none;">
                <img id="sc-preview-img" class="sc-media-preview" style="display:none;" alt="">
                <video id="sc-preview-video" class="sc-media-preview" style="display:none;" controls></video>
            </div>

            <!-- Text story editor -->
            <div id="sc-text-editor" style="display:none;">
                <div id="sc-text-preview" class="sc-text-preview" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
                    <p id="sc-text-preview-content"></p>
                </div>
                <div class="sc-form-section">
                    <textarea class="sc-text-input" id="sc-text-input" rows="3" maxlength="200" placeholder="Type your story..."
                        oninput="window._scUpdateTextPreview()"></textarea>
                </div>
                <div class="sc-form-section">
                    <div class="sc-palette-label" data-i18n="settings.accentColor">Text color</div>
                    <div class="sc-color-row" id="sc-text-colors">
                        <button class="sc-color-dot active" style="background:#fff;" onclick="window._scSetTextColor('#ffffff',this)"></button>
                        <button class="sc-color-dot" style="background:#000;" onclick="window._scSetTextColor('#000000',this)"></button>
                        <button class="sc-color-dot" style="background:#ffde03;" onclick="window._scSetTextColor('#ffde03',this)"></button>
                        <button class="sc-color-dot" style="background:#ff6b6b;" onclick="window._scSetTextColor('#ff6b6b',this)"></button>
                        <button class="sc-color-dot" style="background:#4ecdc4;" onclick="window._scSetTextColor('#4ecdc4',this)"></button>
                    </div>
                </div>
                <div class="sc-form-section">
                    <div class="sc-palette-label" data-i18n="settings.chatBackground">Background</div>
                    <div class="sc-color-row" id="sc-bg-colors">
                        <button class="sc-bg-dot active" style="background:linear-gradient(135deg,#667eea,#764ba2);" onclick="window._scSetBg('linear-gradient(135deg,#667eea 0%,#764ba2 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#f093fb,#f5576c);" onclick="window._scSetBg('linear-gradient(135deg,#f093fb 0%,#f5576c 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" onclick="window._scSetBg('linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#43e97b,#38f9d7);" onclick="window._scSetBg('linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:linear-gradient(135deg,#fa709a,#fee140);" onclick="window._scSetBg('linear-gradient(135deg,#fa709a 0%,#fee140 100%)',this)"></button>
                        <button class="sc-bg-dot" style="background:#1a1a2e;" onclick="window._scSetBg('#1a1a2e',this)"></button>
                    </div>
                </div>
            </div>

            <!-- Duration slider -->
            <div class="sc-form-section" id="sc-duration-group" style="display:none;">
                <div class="sc-palette-label">Duration: <span id="sc-duration-label">5s</span></div>
                <input type="range" id="sc-duration-input" class="sc-slider" min="3" max="30" value="5"
                    oninput="document.getElementById('sc-duration-label').textContent=this.value+'s'">
            </div>

            <!-- Text overlay on media -->
            <div class="sc-form-section" id="sc-overlay-group" style="display:none;">
                <div class="sc-palette-label" data-i18n="stories.editorText">Overlay text</div>
                <input class="sc-text-input" id="sc-overlay-text" maxlength="100" placeholder="Add text...">
            </div>

            <!-- Music -->
            <div class="sc-form-section">
                <div class="sc-palette-label" data-i18n="stories.editorMusic">Music</div>
                <div class="sc-music-row">
                    <input class="sc-text-input" id="sc-music-title" maxlength="80" placeholder="Track name..." style="flex:1;">
                    <label class="sc-music-upload-btn">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                        <input type="file" id="sc-music-file" accept="audio/*" style="display:none;" onchange="window._scMusicFileChange(this)">
                    </label>
                </div>
                <div id="sc-music-preview" class="sc-music-name" style="display:none;"></div>
            </div>
        </div>

        <!-- Hidden inputs -->
        <input type="file" id="sc-photo-file" accept="image/*" style="display:none;" onchange="window._scMediaFileChange(this,'photo')">
        <input type="file" id="sc-video-file" accept="video/*" style="display:none;" onchange="window._scMediaFileChange(this,'video')">
        <canvas id="sc-canvas" style="display:none;"></canvas>
    </div>
</div>
