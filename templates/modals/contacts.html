<!-- Contacts Modal (SRP: contact list + search) -->
<div class="modal-overlay" id="contacts-modal" role="dialog" aria-modal="true" aria-label="Контакты">
    <div class="modal" style="width:480px;">
        <div class="modal-title" data-i18n="nav.contacts">Контакты</div>
        <div style="margin-bottom:14px;display:flex;gap:8px;">
            <button class="contacts-add-btn" style="flex:1;" onclick="closeModal('contacts-modal');showSearchModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span data-i18n="contacts.findUser">Найти пользователя</span>
            </button>
            <button class="btn btn-secondary btn-sm" style="padding:8px 14px;border-radius:12px;" onclick="showManageGroupsModal()" data-i18n="contacts.manageGroups">Groups</button>
        </div>
        <div id="contact-group-tabs" style="padding:0 2px;"></div>
        <div id="contacts-list" style="max-height:380px;overflow-y:auto;padding:4px 0;"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('contacts-modal')" data-i18n="app.close">Закрыть</button>
        </div>
    </div>
</div>
