<!-- Spaces Modals (SRP: space create/join/settings) -->
<!-- Create / Join Space Modal -->
<div class="modal-overlay" id="create-space-modal" role="dialog" aria-modal="true" aria-label="Создать пространство">
    <div class="modal">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
                <circle cx="12" cy="12" r="2"/>
            </svg>
            <div>Space</div>
        </div>
        <div id="cs-alert" class="alert"></div>

        <div class="cs-tabs">
            <button class="cs-tab active" onclick="window._switchCsTab('create')" data-i18n="app.create">Создать</button>
            <button class="cs-tab" onclick="window._switchCsTab('join')" data-i18n="spaces.join">Вступить</button>
        </div>

        <!-- Create panel -->
        <div class="cs-panel active" id="cs-panel-create">
            <div class="form-group">
                <label class="form-label" data-i18n="room.name">Название</label>
                <input class="form-input" id="cs-name" placeholder="Мой Space" data-i18n-placeholder="spaces.namePlaceholder" maxlength="50">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="room.description">Описание</label>
                <textarea class="form-input" id="cs-desc" placeholder="О чём этот Space?" data-i18n-placeholder="spaces.descPlaceholder" rows="2" maxlength="300" style="resize:vertical;"></textarea>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px;">
                <input type="checkbox" id="cs-public" style="width:18px;height:18px;accent-color:var(--accent);">
                <label for="cs-public" style="font-size:13px;cursor:pointer;" data-i18n="spaces.public">Публичный Space</label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('create-space-modal')" data-i18n="app.cancel">Отмена</button>
                <button class="btn btn-primary" onclick="createSpace()" data-i18n="app.create">Создать</button>
            </div>
        </div>

        <!-- Join panel -->
        <div class="cs-panel" id="cs-panel-join">
            <div class="form-group">
                <label class="form-label" data-i18n="spaces.inviteCode">Код приглашения</label>
                <input class="form-input" id="cs-join-code" placeholder="ABCD1234"
                       style="text-transform:uppercase;letter-spacing:3px;font-size:18px;text-align:center;"
                       maxlength="8" oninput="this.value=this.value.toUpperCase()">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('create-space-modal')" data-i18n="app.cancel">Отмена</button>
                <button class="btn btn-primary" onclick="joinSpaceByCode()" data-i18n="spaces.join">Вступить</button>
            </div>
        </div>
    </div>
</div>

<!-- Space Settings Modal -->
<div class="modal-overlay" id="space-settings-modal" role="dialog" aria-modal="true" aria-label="Настройки пространства">
    <div class="modal" style="width:460px;max-height:80vh;display:flex;flex-direction:column;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
            <div style="flex:1;" data-i18n="spaces.settings">Настройки Space</div>
            <button class="header-btn" onclick="closeModal('space-settings-modal')" style="margin:-4px -4px -4px 0;" title="Закрыть">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div id="ss-alert" class="alert"></div>
        <div style="overflow-y:auto;flex:1;min-height:0;">
            <div class="form-group">
                <label class="form-label" data-i18n="room.name">Название</label>
                <input class="form-input" id="ss-name" placeholder="Название Space" data-i18n-placeholder="spaces.namePlaceholder" maxlength="50">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="room.description">Описание</label>
                <textarea class="form-input" id="ss-desc" placeholder="Описание" data-i18n-placeholder="room.description" rows="2" maxlength="300" style="resize:vertical;"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" data-i18n="spaces.inviteCode">Код приглашения</label>
                <div class="ss-invite-row">
                    <span class="ss-invite-code" id="ss-invite-code">---</span>
                    <button class="btn btn-secondary btn-sm" id="ss-copy-btn" onclick="copySpaceInvite()" data-i18n="app.copy">Копировать</button>
                </div>
            </div>

            <div style="font-size:12px;color:var(--text2);margin-bottom:12px;font-family:var(--mono);" id="ss-member-count">0 участников</div>

            <div class="form-group">
                <label class="form-label" data-i18n="chat.members">Участники</label>
                <div id="ss-members-list" style="max-height:200px;overflow-y:auto;"></div>
            </div>

            <div class="modal-actions" style="margin-top:12px;">
                <button class="btn btn-primary" onclick="saveSpaceSettings()" data-i18n="app.save">Сохранить</button>
            </div>

            <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;">
                <button class="btn btn-secondary btn-sm" onclick="leaveSpace()" style="color:var(--yellow);" data-i18n="spaces.leave">Покинуть Space</button>
                <button class="btn btn-secondary btn-sm" onclick="deleteSpace()" style="color:var(--red);" data-i18n="spaces.delete">Удалить Space</button>
            </div>
        </div>
    </div>
</div>

<!-- Create Room in Space Modal -->
<div class="modal-overlay" id="create-room-in-space-modal" role="dialog" aria-modal="true" aria-label="Создать комнату в пространстве">
    <div class="modal">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <div data-i18n="spaces.newRoomInSpace">Новая комната в Space</div>
        </div>
        <input type="hidden" id="crs-space-id" value="">
        <input type="hidden" id="crs-category-id" value="">
        <div id="crs-alert" class="alert"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="room.name">Название</label>
            <input class="form-input" id="crs-name" placeholder="Название комнаты" data-i18n-placeholder="room.namePlaceholder" maxlength="50">
        </div>
        <div class="form-group">
            <label class="form-label" data-i18n="spaces.type">Тип</label>
            <select class="form-input" id="crs-type" style="padding:8px 12px;">
                <option value="text" data-i18n="spaces.textRoom">Текстовая комната</option>
                <option value="channel" data-i18n="spaces.channel">Канал</option>
                <option value="voice" data-i18n="spaces.voiceRoom">Голосовой</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('create-room-in-space-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="createRoomInSpace()" data-i18n="app.create">Создать</button>
        </div>
    </div>
</div>
