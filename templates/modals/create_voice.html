<div class="modal-overlay" id="create-voice-modal" role="dialog" aria-modal="true" aria-label="Создать голосовой канал">
    <div class="modal" style="width:360px;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <div data-i18n="nav.newVoiceChannel">Voice Channel</div>
        </div>
        <div id="vc-create-alert" class="alert" style="margin-bottom:12px;"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="rooms.channelName">Название канала</label>
            <input class="form-input" id="vc-new-name" maxlength="60" placeholder="General Voice" autofocus>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('create-voice-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="createVoiceChannel()" data-i18n="app.create">Создать</button>
        </div>
    </div>
</div>
