<!-- Gallery Modal (SRP: media gallery viewer) -->
<div class="modal-overlay" id="gallery-modal" role="dialog" aria-modal="true" aria-label="Галерея медиа">
    <div class="modal" style="width:520px;max-height:80vh;display:flex;flex-direction:column;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                 fill="currentColor" viewBox="0 0 24 24">
                <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/>
            </svg>
            <div style="flex:1;" data-i18n="gallery.media">Медиа</div>
            <button class="header-btn" onclick="closeModal('gallery-modal')" style="margin:-4px -4px -4px 0;" title="Закрыть">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="gallery-tabs">
            <button class="gallery-tab active" data-gallery-tab="photo" onclick="switchGalleryTab('photo')" data-i18n="auth.photo">Фото</button>
            <button class="gallery-tab" data-gallery-tab="video" onclick="switchGalleryTab('video')" data-i18n="gallery.video">Видео</button>
            <button class="gallery-tab" data-gallery-tab="files" onclick="switchGalleryTab('files')" data-i18n="gallery.files">Файлы</button>
        </div>
        <div id="gallery-grid" class="gallery-grid" style="overflow-y:auto;flex:1;min-height:0;"></div>
    </div>
</div>
