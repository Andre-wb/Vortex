<!-- Report Modal (SRP: user/content reporting) -->
<div class="modal-overlay" id="report-modal" role="dialog" aria-modal="true" aria-label="Жалоба">
    <div class="modal" style="width:380px;">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
            </svg>
            <div style="flex:1;" data-i18n="report.title">Пожаловаться</div>
            <button class="header-btn" onclick="closeModal('report-modal')" style="margin:-4px -4px -4px 0;" title="Закрыть">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div id="report-alert" class="alert" style="display:none;"></div>
        <input type="hidden" id="report-target-id" value="">
        <input type="hidden" id="report-message-id" value="">
        <div class="form-group">
            <label class="form-label" data-i18n="report.reason">Причина</label>
            <select class="form-input" id="report-reason" style="padding:8px 12px;">
                <option value="spam" data-i18n="report.spam">Спам</option>
                <option value="harassment" data-i18n="report.harassment">Оскорбления</option>
                <option value="nsfw" data-i18n="report.nsfw">Неприемлемый контент</option>
                <option value="other" data-i18n="report.other">Другое</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label" data-i18n="report.descriptionLabel">Описание (необязательно)</label>
            <textarea class="form-input" id="report-description" placeholder="Опишите проблему..." data-i18n-placeholder="report.descPlaceholder" maxlength="500" rows="3" style="resize:vertical;"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('report-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" id="report-submit-btn" onclick="window.submitReport()" style="background:linear-gradient(135deg,#ef4444,#dc2626);" data-i18n="report.submit">Отправить жалобу</button>
        </div>
    </div>
</div>
