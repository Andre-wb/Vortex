<!-- Voice Channel View (SRP: voice participants + controls) -->
        <!-- Панель голосового канала (voice channel view, screen inside #main) -->
        <!-- ═══════════════════════════════════════════════════════════════════ -->
        <div id="voice-channel-panel" class="screen" style="display:none;">
            <div class="vc-header">
                <div class="vc-header-left">
                    <div class="vc-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="vc-name" id="vc-name">Voice Channel</div>
                        <div class="vc-count" id="vc-count" data-i18n="voice.participants">0 участников</div>
                    </div>
                </div>
            </div>
            <div class="vc-participants" id="vc-participants">
                <!-- Сетка карточек участников -->
            </div>
            <!-- Скрытый контейнер для audio-элементов удалённых потоков -->
            <div id="vc-audio-container" style="display:none;"></div>
            <div class="vc-controls">
                <button class="vc-btn" id="vc-mute-btn" onclick="toggleVoiceMute()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 12V6c0-2.21-1.79-4-4-4S8 3.79 8 6v6c0 2.21 1.79 4 4 4s4-1.79 4-4m-6 0V6c0-1.1.9-2 2-2s2 .9 2 2v6c0 1.1-.9 2-2 2s-2-.9-2-2"/>
                        <path d="M18 12c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.07 3.06 7.44 7 7.93V22h2v-2.07c3.94-.49 7-3.86 7-7.93z"/>
                    </svg>
                    <span data-i18n="voice.muteMic">Выкл. микр.</span>
                </button>
                <button class="vc-btn vc-btn-leave" onclick="leaveVoiceChannel()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28a11.27 11.27 0 0 0-2.67-1.85.996.996 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                    </svg>
                    <span data-i18n="voice.leave">Выйти</span>
                </button>
            </div>
        </div>
    </div>

    <div id="peers-panel" role="complementary" aria-label="Пиры в сети">
        <div class="panel-header">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                  fill="currentColor" viewBox="0 0 24 24" >
                <path d="M15 12c1.65 0 3-1.35 3-3s-1.35-3-3-3-3 1.35-3 3c0 .46.11.89.3 1.29l-1.1 1.1L6.11 6.3a.996.996 0 0 0-1.41 0c-3.35 3.35-3.57 8.66-.67 12.26L2.29 20.3l1.41 1.41 1.73-1.73A9.18 9.18 0 0 0 11.19 22a9.2 9.2 0 0 0 6.51-2.69.996.996 0 0 0 0-1.41l-5.09-5.09 1.1-1.1c.39.19.82.3 1.29.3Zm-8.89 5.89a7.21 7.21 0 0 1-.66-9.43l10.09 10.09a7.21 7.21 0 0 1-9.43-.66M15 8c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1"></path><path d="M19.95 4.05a6.9 6.9 0 0 0-2.32-1.54 7.06 7.06 0 0 0-5.27 0l.75 1.85c1.2-.49 2.57-.49 3.76 0 .62.25 1.18.62 1.65 1.1.48.48.85 1.03 1.1 1.65.24.6.37 1.23.37 1.88s-.12 1.28-.37 1.88l1.85.75c.34-.84.51-1.73.51-2.63s-.17-1.79-.51-2.63c-.35-.87-.87-1.65-1.54-2.32Z"></path>
            </svg>
            <div data-i18n="nav.devicesOnline">
                Устройства в сети
            </div>
            <span class="panel-close" onclick="togglePeersPanel()">
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                      fill="currentColor" viewBox="0 0 24 24" >
                    <path d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z"></path>
                </svg>
            </span>
        </div>
        <div id="peers-list" style="overflow-y:auto;flex:1;"></div>
    </div>
</div>
