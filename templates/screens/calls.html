<!-- Calls Screen — Recent calls history (fullscreen tab view) -->
<div id="tab-view-calls" class="tab-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
    <!-- Header -->
    <div class="calls-header">
        <h2 data-i18n="calls.title">Recent Calls</h2>
        <div class="calls-filters">
            <button class="calls-filter-pill active" onclick="filterCalls('all')" id="calls-filter-all" data-i18n="calls.all">All</button>
            <button class="calls-filter-pill" onclick="filterCalls('missed')" id="calls-filter-missed" data-i18n="calls.missed">Missed</button>
            <button class="calls-filter-pill calls-filter-danger" onclick="clearCallHistory()" data-i18n="calls.clear">Clear</button>
        </div>
    </div>
    <!-- Call list -->
    <div id="calls-list" style="flex:1;overflow-y:auto;padding:8px 12px;">
        <div id="calls-empty" class="calls-empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
            </svg>
            <span data-i18n="calls.noCalls">No recent calls</span>
        </div>
        <div id="calls-items"></div>
    </div>
</div>
