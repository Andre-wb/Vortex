<!-- Story Viewer — fullscreen overlay -->
<div id="story-viewer" class="story-viewer" style="display:none;" role="dialog" aria-modal="true">

    <!-- Progress bars -->
    <div class="sv-progress-row" id="sv-progress-row"></div>

    <!-- Header -->
    <div class="sv-header">
        <div class="sv-user-info" id="sv-user-info">
            <div class="sv-avatar" id="sv-avatar"></div>
            <div>
                <div class="sv-username" id="sv-username"></div>
                <div class="sv-time" id="sv-time"></div>
            </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
            <button class="sv-icon-btn" id="sv-delete-btn" style="display:none;" onclick="window._deleteCurrentStory()" title="Удалить">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <button class="sv-icon-btn" onclick="window.closeStoryViewer()" title="Закрыть" aria-label="Закрыть">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="sv-content" id="sv-content">
        <img id="sv-img" class="sv-media" style="display:none;" alt="">
        <video id="sv-video" class="sv-media" style="display:none;" playsinline muted></video>
        <div id="sv-text-slide" class="sv-text-slide" style="display:none;">
            <p id="sv-text-content"></p>
        </div>
    </div>

    <!-- Music badge -->
    <div class="sv-music-badge" id="sv-music-badge" style="display:none;">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <span id="sv-music-title"></span>
    </div>
    <audio id="sv-audio" style="display:none;" loop></audio>

    <!-- Tap zones -->
    <div class="sv-tap-left"  id="sv-tap-left"  onpointerdown="window._svTapStart(event,'left')"  onpointerup="window._svTapEnd(event,'left')"></div>
    <div class="sv-tap-right" id="sv-tap-right" onpointerdown="window._svTapStart(event,'right')" onpointerup="window._svTapEnd(event,'right')"></div>

    <!-- Views counter (own stories) -->
    <div class="sv-views" id="sv-views" style="display:none;">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        <span id="sv-views-count"></span>
    </div>
</div>
