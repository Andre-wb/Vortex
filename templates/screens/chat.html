                                <button class="header-popup-item" id="videocall-btn" onclick="startVideoCall();closeCallPicker()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M18 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4.33L22 17V7l-4 3.33zm-2 12H4V6h12z"/></svg>

                        </div>

                        <!-- ── Три точки ───────────────────────────────────── -->
                        <div class="header-popup-wrap" id="header-dots-wrap">
                            <button class="header-btn" id="header-dots-btn" onclick="toggleHeaderMenu(event)" title="Ещё" data-i18n-title="chat.more">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                                </svg>
                            </button>
                            <div class="header-popup header-dots-menu" id="header-dots-menu">
                                <button class="header-popup-item" onclick="toggleChatSearch();closeHeaderMenu()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                                    <span data-i18n="chat.searchMessages">Поиск сообщений</span>
                                </button>
                                <button class="header-popup-item" onclick="openTaskList();closeHeaderMenu()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M22 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm0 8c0-.55-.45-1-1-1h-7c-.55 0-1 .45-1 1s.45 1 1 1h7c.55 0 1-.45 1-1zm-10.29-3.29l-3 3a.996.996 0 01-1.41 0l-1.5-1.5a.996.996 0 111.41-1.41l.79.79 2.29-2.29a.996.996 0 111.41 1.41zm0-8l-3 3a.996.996 0 01-1.41 0l-1.5-1.5a.996.996 0 011.41-1.41l.79.79 2.29-2.29c.39-.39 1.02-.39 1.41 0 .4.39.4 1.02.01 1.41z"/></svg>
                                    <span data-i18n="chat.tasks">Задачи</span>
                                </button>
                                <!-- Channel items moved to channel settings panel (room_settings.html) -->
                                <!-- Channel discussion (visible to all subscribers) -->
                                <button class="header-popup-item" onclick="window._openChannelDiscussion();closeHeaderMenu()" id="header-discussion-btn" style="display:none;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg>
                                    <span data-i18n="channel.discussion">Перейти к чату</span>
                                </button>
                                <!-- Channel admin items (stream, settings) -->
                                <div id="header-channel-items" style="display:none;">
                                    <div class="header-popup-divider"></div>
                                    <button class="header-popup-item" onclick="window._startChannelStream();closeHeaderMenu()" id="header-stream-btn">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                                        <span data-i18n="channel.goLive">Начать стрим</span>
                                    </button>
                                    <button class="header-popup-item" onclick="openRoomSettings();closeHeaderMenu()">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                                        <span data-i18n="channel.settings">Настройки канала</span>
                                    </button>
                                </div>
                                <!-- ── Common items ── -->
                                <button class="header-popup-item" onclick="toggleScheduleMode()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/></svg>
                                    <span data-i18n="chat.scheduleMessage">Запланировать</span>
                                </button>
                                <div id="schedule-picker" style="display:none;padding:6px 12px 2px;flex-direction:column;gap:4px;">
                                    <input type="datetime-local" id="schedule-datetime" aria-label="Дата и время отправки" onchange="setScheduleDatetime(this);closeHeaderMenu()"
                                           style="width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;font-family:var(--mono);box-sizing:border-box;">
                                </div>
                                <button class="header-popup-item" onclick="toggleTimedMode();closeHeaderMenu()">

                                    <span data-i18n="chat.selfDestruct">Самоуничтожение</span>
                                </button>
                                <button class="header-popup-item" onclick="showAutoDeleteMenu();closeHeaderMenu()" style="position:relative;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                                    <span data-i18n="chat.autoDelete">Автоудаление</span>

                                </button>
                                <button class="header-popup-item" onclick="exportChat();closeHeaderMenu()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/></svg>
                                    <span data-i18n="chat.exportChat">Экспорт истории</span>
                                </button>
                            </div>
                        </div>

                    </section>
                </div>
            </div>

            <!-- Поиск по сообщениям (клиентский) -->
            <div id="chat-search-bar" style="display:none;">
                <input class="form-input" id="chat-search-input" placeholder="Поиск по сообщениям..." data-i18n-placeholder="chat.searchMessagesPlaceholder" aria-label="Поиск по сообщениям"
                       oninput="searchMessages(this.value)"
                       onkeydown="handleSearchKey(event)"
                       autocomplete="off">
                <span id="search-match-count" class="search-match-count"></span>
                <button class="search-nav-btn" onclick="searchNavigate(-1)" title="Предыдущее совпадение" data-i18n-title="chat.prevMatch">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                </button>
                <button class="search-nav-btn" onclick="searchNavigate(1)" title="Следующее совпадение" data-i18n-title="chat.nextMatch">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                </button>
                <button class="search-nav-btn" onclick="toggleChatSearch()" title="Закрыть поиск" data-i18n-title="chat.closeSearch">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>

            <!-- Drag & Drop overlay -->
            <div id="drop-overlay">
                <div class="drop-overlay-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>

            </div>

            <div id="pinned-bar" class="pinned-bar" style="display:none;"></div>

            <div id="stream-live-banner" class="stream-live-banner" style="display:none;">

                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    <span class="stream-live-banner-count">0</span>

                <span class="stream-live-banner-join" data-i18n="stream.watchLive">Watch</span>

                        </svg>
                    </button>
                </div>

                            <div class="attach-icon file">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M17 5H9c-3.86 0-7 3.14-7 7s3.14 7 7 7h9v-2H9c-2.76 0-5-2.24-5-5s2.24-5 5-5h8c.79 0 1.54.31 2.11.89a2.967 2.967 0 0 1 .01 4.23 3 3 0 0 1-2.12.89H9c-.26 0-.5-.11-.7-.3-.19-.2-.3-.44-.3-.7s.11-.51.3-.7.44-.3.7-.3h8v-2H9c-.79 0-1.54.32-2.11.89S6 11.22 6 12.01s.31 1.54.89 2.11c.57.57 1.32.89 2.11.89h8c1.32 0 2.58-.52 3.53-1.47S22 11.34 22 10.01s-.52-2.58-1.47-3.53a4.95 4.95 0 0 0-3.52-1.47Z"/>

                                </svg>
                            </div>
                            <span data-i18n="chat.shareLocation">Локация</span>

                        <button class="attach-item" id="poll-btn" onclick="openPollModal();toggleAttachPanel()" aria-label="Создать опрос">

                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/>

                        </button>
                        <button class="attach-item" onclick="openPaymentModal();toggleAttachPanel()" aria-label="Запрос оплаты">
                            <div class="attach-icon payment">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>

                            <span data-i18n="chat.paymentRequest">Оплата</span>

                    </div>
                </div>

                <div class="input-row">
                    <!-- Mini App button — shown only in bot DMs -->
                    <button class="input-btn mini-app-btn" id="mini-app-btn" onclick="window.openMiniApp()" title="Mini App" aria-label="Открыть мини-приложение" style="display:none;">

                            <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
                        </svg>
                    </button>

                    <button class="input-btn" id="attach-panel-btn" onclick="toggleAttachPanel()" title="Прикрепить" data-i18n-title="chat.attachFile" aria-label="Прикрепить файл">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" style="transform: rotate(-45deg)"
                             fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17 5H9c-3.86 0-7 3.14-7 7s3.14 7 7 7h9v-2H9c-2.76 0-5-2.24-5-5s2.24-5 5-5h8c.79 0 1.54.31 2.11.89a2.967 2.967 0 0 1 .01 4.23 3 3 0 0 1-2.12.89H9c-.26 0-.5-.11-.7-.3-.19-.2-.3-.44-.3-.7s.11-.51.3-.7.44-.3.7-.3h8v-2H9c-.79 0-1.54.32-2.11.89S6 11.22 6 12.01s.31 1.54.89 2.11c.57.57 1.32.89 2.11.89h8c1.32 0 2.58-.52 3.53-1.47S22 11.34 22 10.01s-.52-2.58-1.47-3.53a4.95 4.95 0 0 0-3.52-1.47Z"/>
                        </svg>
                    </button>

                    <!-- AI Text Assistant (Qwen3-8B) -->
                    <div class="ai-text-wrap">
                        <button class="input-btn ai-text-btn" id="ai-text-btn" title="AI-ассистент текста" aria-label="AI-ассистент текста">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1.5a.5.5 0 0 1 0 1H21v1a7 7 0 0 1-7 7H10a7 7 0 0 1-7-7v-1H1.5a.5.5 0 0 1 0-1H3a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 12 2zm-2 7a5 5 0 0 0-5 5v1a5 5 0 0 0 5 5h4a5 5 0 0 0 5-5v-1a5 5 0 0 0-5-5h-4zm-1 5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm6 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-5 4h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1 0-1z"/>
                            </svg>
                        </button>
                        <div class="ai-text-menu" id="ai-text-menu">
                            <div class="ai-text-menu-header" data-i18n="ai.textAssistant">AI-ассистент</div>
                            <button class="ai-text-menu-item" data-action="fix">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12.146 2.354a.5.5 0 0 1 .708 0l3.792 3.793-1.414 1.414L12 4.33 8.768 7.561l-1.414-1.414 3.792-3.793zM4 10h16v2H4v-2zm2.5 4h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1 0-1zm2 3h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1zm2 3h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1 0-1z"/></svg>
                                <span data-i18n="ai.fixErrors">Исправить ошибки</span>
                            </button>
                            <div class="ai-text-menu-divider"></div>
                            <div class="ai-text-menu-sub" data-i18n="ai.rephrase">Перефразировать</div>
                            <button class="ai-text-menu-item" data-action="rephrase" data-style="formal">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 10H4V8h16v8zm-6-1h4v-2h-4v2zm-8 0h6v-2H6v2zm8-3h4v-2h-4v2zm-8 0h6v-2H6v2z"/></svg>
                                <span data-i18n="ai.formal">Официальный</span>
                            </button>
                            <button class="ai-text-menu-item" data-action="rephrase" data-style="casual">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                                <span data-i18n="ai.casual">Непринуждённый</span>
                            </button>
                            <button class="ai-text-menu-item" data-action="rephrase" data-style="professional">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20 7h-4V5l-2-2h-4L8 5v2H4c-1.1 0-2 .9-2 2v5c0 .75.4 1.38 1 1.73V19c0 1.11.89 2 2 2h14c1.11 0 2-.89 2-2v-3.28c.59-.35 1-.99 1-1.72V9c0-1.1-.9-2-2-2zm-6 0h-4V5h4v2z"/></svg>
                                <span data-i18n="ai.professional">Деловой</span>
                            </button>
                            <button class="ai-text-menu-item" data-action="rephrase" data-style="creative">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7.5 5.6L10 7l-1.4 2.5L11 12l-2.5 1.4L7 16l-1.6-2.6L3 12l2.5-1.4L7 8l.5-2.4zM19 3l-1 4-4 1 4 1 1 4 1-4 4-1-4-1-1-4zm-1 14l-.7 2.8L14.5 21l2.8.7L18 24.5l.7-2.8 2.8-.7-2.8-.7L18 17z"/></svg>
                                <span data-i18n="ai.creative">Творческий</span>
                            </button>
                        </div>
                    </div>

                    <textarea id="msg-input" rows="1" placeholder="Сообщение..." data-i18n-placeholder="chat.messagePlaceholder" aria-label="Введите сообщение"
                              onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>

                    <!-- Expression picker trigger (GIF / Emoji / Sticker) -->
                    <div class="expr-trigger-wrap">
                        <button class="input-btn" id="expr-btn" onclick="toggleExprPanel()" title="GIF, Эмодзи, Стикеры" aria-label="GIF, Эмодзи, Стикеры">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10S22 17.52 22 12 17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                            </svg>
                        </button>
                        <div id="expr-panel" class="expr-panel">
                            <button class="expr-item" onclick="openGifPicker();toggleExprPanel()" aria-label="GIF">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M11.5 9H13v6h-1.5zM9 9H6c-.6 0-1 .5-1 1v4c0 .5.4 1 1 1h3c.6 0 1-.5 1-1v-2H8.5v1.5h-2v-3H10V10c0-.5-.4-1-1-1zm10 1.5V9h-4.5v6H16v-2h2v-1.5h-2v-1z"/>
                                </svg>
                                <span>GIF</span>
                            </button>
                            <button class="expr-item" id="emoji-input-btn" onclick="window._toggleEmojiPicker?.();toggleExprPanel()" aria-label="Эмодзи">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10S22 17.52 22 12 17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                                </svg>
                                <span data-i18n="chat.emoji">Эмодзи</span>
                            </button>
                            <button class="expr-item" onclick="openStickerPicker();toggleExprPanel()" aria-label="Стикеры">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                                </svg>
                                <span data-i18n="chat.stickers">Стикеры</span>
                            </button>
                        </div>
                    </div>

                    <button class="input-btn" id="voice-record-btn" title="Голосовое сообщение" data-i18n-title="chat.voiceMessage" aria-label="Голосовое сообщение">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                             fill="currentColor" viewBox="0 0 24 24">
                            <path d="M16 12V6c0-2.21-1.79-4-4-4S8 3.79 8 6v6c0 2.21 1.79 4 4 4s4-1.79 4-4m-6 0V6c0-1.1.9-2 2-2s2 .9 2 2v6c0 1.1-.9 2-2 2s-2-.9-2-2"/>
                            <path d="M18 12c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.07 3.06 7.44 7 7.93V22h2v-2.07c3.94-.49 7-3.86 7-7.93z"/>
                        </svg>
                    </button>

                    <button class="input-btn" id="video-note-btn" title="Видеосообщение (кружок)" data-i18n-title="chat.videoNote" aria-label="Видеосообщение" style="display:none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                        </svg>
                    </button>

                    <button class="input-btn send" onclick="sendMessage()" title="Отправить" data-i18n-title="chat.send" aria-label="Отправить сообщение">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>

                <input type="file" id="file-input" style="display:none" onchange="uploadFile(event)"
                       accept="image/*,video/*,audio/*,application/pdf,text/plain,application/zip">
            </div>
        </div>

        <!-- ── Mini App fullscreen viewer ─────────────────────────────────── -->
        <div id="mini-app-screen" class="mini-app-screen">
            <!-- Drag handle -->
            <div class="mini-app-drag" onclick="window.closeMiniApp()"></div>

            <!-- Header bar -->
            <div class="mini-app-header">
                <button class="mini-app-back" onclick="window.closeMiniApp()" aria-label="Назад">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </button>
                <div class="mini-app-header-info">
                    <span class="mini-app-header-name" id="mini-app-panel-name">Mini App</span>
                    <span class="mini-app-header-sub" id="mini-app-header-sub" data-i18n="tabs.bots">бот</span>
                </div>
                <div class="mini-app-header-right">
                    <div class="mini-app-secure-badge">
                        <svg width="11" height="11" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                        Secure
                    </div>
                </div>
            </div>

            <!-- App content area -->
            <div class="mini-app-content" id="mini-app-panel-body">
                <!-- rendered by JS -->
            </div>
        </div>
