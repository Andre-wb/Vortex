<!-- Settings — Fullscreen tab view -->
<div id="tab-view-settings" class="tab-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;">

    <!-- Header -->
    <div class="set-main-header">
        <h2 class="set-main-title" data-i18n="tabs.settings">Settings</h2>
    </div>

    <!-- Settings list OR sub-page -->
    <div id="settings-main-list" style="flex:1;overflow-y:auto;">

        <!-- Profile card -->
        <div class="set-profile-card" onclick="openSettingsSection('profile')">
            <div class="set-profile-avatar" id="set-avatar"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
            <div class="set-profile-info">
                <div class="set-profile-name" id="set-name">—</div>
                <div class="set-profile-phone" id="set-phone">—</div>
            </div>
            <svg width="20" height="20" fill="var(--text3)" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </div>

        <!-- Multi-account switcher (под профилем) -->
        <div id="settings-accounts-section" class="set-accounts-section"></div>

        <!-- Sections -->

    <!-- Language sub-page (hidden by default) -->
    <div id="settings-lang-page" class="set-sub-page" style="display:none;">
        <div class="set-sub-header">
            <button class="set-sub-back" onclick="closeSettingsLangPage()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <h2 class="set-sub-title" data-i18n="settings.language">Language</h2>
        </div>
        <div style="padding:8px 16px;flex-shrink:0;">
            <div class="cs-search" style="margin:0;">
                <svg width="16" height="16" fill="var(--text3)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14"/></svg>
                <input type="text" id="lang-search-input" placeholder="Search languages..." data-i18n-placeholder="settings.searchLanguages" oninput="filterLanguages(this.value)">
            </div>
        </div>
        <div id="lang-list" style="flex:1;overflow-y:auto;"></div>
    </div>

    <!-- Sub-section content (appearance, security, etc) -->
    <div id="settings-sub-page" class="set-sub-page" style="display:none;">
        <div class="set-sub-header">
            <button class="set-sub-back" onclick="closeSettingsSubPage()">

            <h2 id="settings-sub-title" class="set-sub-title"></h2>
        </div>
        <div id="settings-sub-content" class="set-sub-content"></div>
    </div>
</div>
