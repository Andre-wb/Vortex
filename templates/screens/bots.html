<!-- Bot Store — Fullscreen tab view for bot marketplace -->
<div id="tab-view-bots" class="tab-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;">

    <!-- Header -->
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <h2 style="margin:0;font-size:20px;color:var(--text);" data-i18n="bots.storeTitle">Bot Store</h2>
            <button class="btn btn-primary btn-sm" onclick="switchBottomTab('settings');openSettingsSection('bots')" data-i18n="bots.createBot">Create Bot</button>
        </div>
        <!-- Search -->
        <div class="cs-search" style="margin:0;">
            <svg width="16" height="16" fill="var(--text3)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14"/></svg>
            <input type="text" id="bot-store-search" data-i18n-placeholder="bots.searchBots" placeholder="Search bots..." oninput="searchBotStore(this.value)">
        </div>
    </div>

    <!-- Category pills -->
    <div style="display:flex;gap:6px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;" id="bot-categories">
        <button class="cs-folder-tab active" onclick="filterBotCategory('')" data-cat="" data-i18n="bots.allBots">All</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('utilities')" data-cat="utilities" data-i18n="bots.catUtilities"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4"/></svg> Utilities</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('games')" data-cat="games" data-i18n="bots.catGames"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2m-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2m4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5m4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5"/></svg> Games</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('moderation')" data-cat="moderation" data-i18n="bots.catModeration"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4"/></svg> Moderation</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('music')" data-cat="music" data-i18n="bots.catMusic"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg> Music</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('productivity')" data-cat="productivity" data-i18n="bots.catProductivity"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6m7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19"/></svg> Productivity</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('social')" data-cat="social" data-i18n="bots.catSocial"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2"/></svg> Social</button>
        <button class="cs-folder-tab" onclick="filterBotCategory('fun')" data-cat="fun" data-i18n="bots.catFun"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2M12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8m3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5m-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11m3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5"/></svg> Fun</button>
    </div>

    <!-- Bot grid -->
    <div id="bot-store-content" style="flex:1;overflow-y:auto;padding:12px 0;">

        <!-- Featured section -->
        <div id="bot-featured-section">
            <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;" data-i18n="bots.featured">Featured Bots</div>
            <div id="bot-featured-grid" class="bot-grid"></div>
        </div>

        <!-- All bots -->
        <div style="font-size:15px;font-weight:700;color:var(--text);margin:16px 0 10px;" data-i18n="bots.popular">Popular</div>
        <div id="bot-store-grid" class="bot-grid"></div>

        <!-- Empty state -->
        <div id="bot-store-empty" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;color:var(--text3);gap:12px;">
            <svg width="48" height="48" fill="currentColor" viewBox="0 0 24 24" opacity="0.3"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.07A7.001 7.001 0 0 1 7.07 19H6a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h-1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5 2.5 2.5 0 0 0 7.5 18a2.5 2.5 0 0 0 2.5-2.5A2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5 2.5 2.5 0 0 0 2.5 2.5 2.5 2.5 0 0 0 2.5-2.5 2.5 2.5 0 0 0-2.5-2.5"/></svg>
            <span data-i18n="bots.noBots">No bots found</span>
        </div>
    </div>
</div>
