<!-- Room Info Panel — slides in from right when clicking room name -->
<div id="room-info-panel" class="room-info-panel" role="complementary" aria-label="Room info">
    <button class="room-info-close" onclick="closeRoomInfo()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <div class="room-info-header">
        <div class="room-info-avatar" id="ri-avatar"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        <div class="room-info-name" id="ri-name"></div>
        <div class="room-info-meta" id="ri-meta"></div>
    </div>
    <div class="ri-quick-actions">
        <button class="ri-quick-btn" onclick="showMembersModal()" title="Участники">
            <span class="ri-quick-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M10 13H8c-2.76 0-5 2.24-5 5v1c0 .55.45 1 1 1h10c.55 0 1-.45 1-1v-1c0-2.76-2.24-5-5-5m-5 5c0-1.65 1.35-3 3-3h2c1.65 0 3 1.35 3 3zm7.73-11.49c-.08-.22-.19-.42-.3-.62v-.01c-.69-1.14-1.93-1.89-3.42-1.89-2.28 0-4 1.72-4 4s1.72 4 4 4c1.49 0 2.73-.74 3.42-1.89v-.01c.12-.2.22-.4.3-.62.02-.06.03-.12.05-.18.06-.17.11-.34.15-.52.05-.25.07-.51.07-.78s-.03-.53-.07-.78c-.03-.18-.09-.35-.15-.52-.02-.06-.03-.12-.05-.18M9 10c-1.18 0-2-.82-2-2s.82-2 2-2 2 .82 2 2-.82 2-2 2m6 0q-.165 0-.33-.03c-.22.66-.56 1.27-.98 1.81.41.13.84.22 1.31.22 2.28 0 4-1.72 4-4s-1.72-4-4-4c-.47 0-.9.09-1.31.22.43.53.76 1.14.98 1.81.11-.01.21-.03.33-.03 1.18 0 2 .82 2 2s-.82 2-2 2m1 3h-1.11c.6.58 1.08 1.27 1.44 2.03C17.83 15.2 19 16.46 19 18h-2v1c0 .35-.07.69-.18 1H20c.55 0 1-.45 1-1v-1c0-2.76-2.24-5-5-5"/></svg>
            </span>
            <span class="ri-quick-label" data-i18n="chat.members">Участники</span>
        </button>
        <button class="ri-quick-btn" onclick="openGallery()" title="Медиа">
            <span class="ri-quick-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/></svg>
            </span>
            <span class="ri-quick-label" data-i18n="roomInfo.media">Медиа</span>
        </button>
        <button class="ri-quick-btn" id="ri-mute-btn" onclick="toggleMuteRoom()" title="Уведомления">
            <span class="ri-quick-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 002 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </span>
            <span class="ri-quick-label" id="ri-mute-label" data-i18n="roomInfo.muteNotifications">Звук</span>
        </button>
        <button class="ri-quick-btn" onclick="openRoomSettings()" title="Настройки">
            <span class="ri-quick-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </span>
            <span class="ri-quick-label" data-i18n="roomInfo.roomSettings">Настройки</span>
        </button>
    </div>

    <div class="room-info-section">
        <div class="room-info-section-title" data-i18n="roomInfo.description">Описание</div>
        <div id="ri-description" style="font-size:13px;color:var(--text2);"></div>
    </div>

    <div class="room-info-section">
        <div class="room-info-section-title" data-i18n="roomInfo.members">Участники</div>
        <div id="ri-members-list" style="max-height:200px;overflow-y:auto;"></div>
        <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:8px;" onclick="showMembersModal()" data-i18n="chat.members">Все участники</button>
    </div>

    <div class="room-info-section">
        <div class="room-info-section-title" data-i18n="roomInfo.media">Медиа и файлы</div>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-secondary btn-sm" onclick="openGallery('images')" data-i18n="roomInfo.photos">Фото</button>
            <button class="btn btn-secondary btn-sm" onclick="openGallery('videos')" data-i18n="roomInfo.videos">Видео</button>
            <button class="btn btn-secondary btn-sm" onclick="openGallery('documents')" data-i18n="roomInfo.files">Файлы</button>
        </div>
    </div>

    <div class="room-info-section" id="ri-invite-section">
        <div class="room-info-section-title" data-i18n="roomInfo.inviteCode">Код приглашения</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <code id="ri-invite-code" style="flex:1;background:var(--bg3);padding:8px 12px;border-radius:6px;font-family:var(--mono);font-size:13px;color:var(--accent);"></code>
            <button class="btn btn-secondary btn-sm" onclick="copyInviteCode()" data-i18n="app.copy">Копировать</button>
        </div>
    </div>

    <div class="room-info-section">
        <button class="btn btn-danger btn-sm" style="width:100%;" id="ri-leave-btn" onclick="leaveRoom()" data-i18n="roomInfo.leave">Покинуть комнату</button>
    </div>
</div>
