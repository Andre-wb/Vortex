<!-- Stream Overlay -->
<div id="stream-overlay" class="stream-overlay">
    <div class="stream-header">
        <div class="stream-header-left">
            <div class="stream-live-badge">LIVE</div>
            <div class="stream-header-info">
                <div class="stream-title" id="stream-title"></div>
                <div class="stream-host">
                    <span id="stream-host-name"></span>
                    <span class="stream-viewer-badge">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        <span id="stream-viewer-count">0</span>
                    </span>
                </div>
            </div>
        </div>
        <div class="stream-header-right">
            <div class="stream-rec-badge" id="stream-rec-badge" style="display:none;">
                <span class="stream-rec-dot"></span> REC
            </div>
            <div class="stream-timer" id="stream-timer">0:00</div>
            <button class="stream-minimize-btn" onclick="streamMinimizeOrExitZen()" title="Свернуть">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19.5 3.09L15 7.59V4h-2v7h7V9h-3.59l4.5-4.5-1.41-1.41zM4 13v2h3.59l-4.5 4.5 1.41 1.41 4.5-4.5V20h2v-7H4z"/></svg>
            </button>
        </div>
    </div>

    <div class="stream-body">
        <div class="stream-video-area">
            <video id="stream-main-video" autoplay playsinline style="display:none;"></video>
            <div id="stream-video-placeholder" class="stream-video-placeholder" data-i18n="stream.waiting">Waiting for stream...</div>
            <video id="stream-local-preview" class="stream-local-preview" autoplay playsinline muted style="display:none;"></video>

            <!-- Floating reactions -->
            <div id="stream-reactions-float" class="stream-reactions-float"></div>

            <!-- Donation alert -->
            <div id="stream-donation-alert" class="stream-donation-alert">
                <div class="stream-donation-name"></div>
                <div class="stream-donation-amount"></div>
                <div class="stream-donation-text"></div>
            </div>
        </div>

        <!-- Side panel: chat + hands -->
        <div class="stream-side-panel">
            <!-- Hands queue (host view) -->
            <div id="stream-host-controls" class="stream-host-controls" style="display:none;">
                <div class="stream-panel-title" data-i18n="stream.handQueue">Raised Hands</div>
                <div id="stream-hands-list" class="stream-hands-list"></div>
            </div>

            <!-- Stream chat -->
            <div class="stream-chat">
                <div class="stream-panel-title" data-i18n="stream.chat">Chat</div>
                <div id="stream-chat-messages" class="stream-chat-messages"></div>
                <div class="stream-chat-input-wrap">
                    <input type="text" id="stream-chat-input" class="stream-chat-input" placeholder="Message..." data-i18n-placeholder="stream.chatPlaceholder"
                           onkeydown="if(event.key==='Enter'){window._sendStreamChatMsg();event.preventDefault();}">
                    <button class="stream-chat-send" onclick="window._sendStreamChatMsg()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls bar -->
    <div class="stream-controls">
        <button class="stream-ctrl-btn" id="stream-mute-btn" onclick="toggleStreamMute()" title="Mic" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M16 12V6c0-2.21-1.79-4-4-4S8 3.79 8 6v6c0 2.21 1.79 4 4 4s4-1.79 4-4m-6 0V6c0-1.1.9-2 2-2s2 .9 2 2v6c0 1.1-.9 2-2 2s-2-.9-2-2"/><path d="M18 12c0 3.31-2.69 6-6 6s-6-2.69-6-6H4c0 4.07 3.06 7.44 7 7.93V22h2v-2.07c3.94-.49 7-3.86 7-7.93z"/></svg>
        </button>
        <button class="stream-ctrl-btn" id="stream-cam-btn" onclick="toggleStreamVideo()" title="Camera" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M18 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4.33L22 17V7l-4 3.33zm-2 12H4V6h12z"/></svg>
        </button>
        <button class="stream-ctrl-btn" id="stream-screen-btn" onclick="toggleStreamScreen()" title="Screen" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
        </button>
        <button class="stream-ctrl-btn" id="stream-hand-btn" onclick="raiseHand()" title="Raise hand" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M21 7c0-1.38-1.12-2.5-2.5-2.5-.17 0-.34.02-.5.05V4c0-1.38-1.12-2.5-2.5-2.5-.23 0-.46.03-.67.09C14.46.66 13.56 0 12.5 0c-1.23 0-2.25.89-2.46 2.06C9.87 2.02 9.69 2 9.5 2 8.12 2 7 3.12 7 4.5v5.89c-.34-.31-.76-.51-1.22-.51-.81 0-1.5.59-1.6 1.4l-.01.1v.1c0 .33.04.67.12 1l1.5 5.22C6.18 19.25 7.54 20.5 9.13 20.5h6.37c1.5 0 2.8-1.06 3.13-2.53l1.18-5.35c.07-.32.1-.64.1-.95V7h.09zm-1.99 4.67-1.18 5.35c-.16.73-.78 1.23-1.45 1.23H9.13c-.8 0-1.52-.63-1.72-1.5L5.91 11.5c-.02-.09-.04-.19-.04-.29l.01-.06c.04-.26.24-.45.34-.45.15 0 .5.37.78.83V12h2V4.5c0-.55.45-1 1-1s1 .45 1 1V10h2V2.5c0-.55.45-1 1-1s1 .45 1 1V10h2V4c0-.55.45-1 1-1s1 .45 1 1v6h2V7c0-.55.45-1 1-1s1 .45 1 1v4.67z"/></svg>
        </button>

        <!-- Zen mode -->
        <button class="stream-ctrl-btn" id="stream-zen-btn" onclick="toggleStreamZen()" title="Zen Mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>

        <div class="stream-ctrl-separator"></div>

        <!-- Reactions -->
        <div id="stream-reactions-panel" class="stream-reactions-btns">
            <button class="stream-reaction-btn" onclick="sendStreamReaction('❤️')">❤️</button>
            <button class="stream-reaction-btn" onclick="sendStreamReaction('🔥')">🔥</button>
            <button class="stream-reaction-btn" onclick="sendStreamReaction('👏')">👏</button>
            <button class="stream-reaction-btn" onclick="sendStreamReaction('😂')">😂</button>
            <button class="stream-reaction-btn" onclick="sendStreamReaction('😮')">😮</button>
            <button class="stream-reaction-btn" onclick="sendStreamReaction('💯')">💯</button>
        </div>

        <div class="stream-ctrl-separator"></div>

        <!-- Donate -->
        <button class="stream-ctrl-btn stream-donate-btn" id="stream-donate-btn" onclick="window._showDonateModal()" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.94s4.18 1.36 4.18 3.87c0 1.89-1.45 2.89-3.12 3.17z"/></svg>
        </button>

        <!-- End / Leave -->
        <button class="stream-ctrl-btn stream-end-btn" id="stream-end-btn" onclick="endStream()" data-i18n="stream.endStream">Завершить</button>
    </div>
</div>

<!-- Stream Settings Modal (before start) -->
<div id="stream-settings-modal" class="modal-overlay stream-settings-modal">
    <div class="stream-settings-content">
        <div class="stream-settings-header">
            <span data-i18n="stream.settings">Stream Settings</span>
            <button class="stream-settings-close" onclick="document.getElementById('stream-settings-modal').classList.remove('show')">&times;</button>
        </div>

        <div class="stream-settings-body">
            <label class="stream-settings-label" data-i18n="stream.title">Title</label>
            <input type="text" id="stream-settings-title" class="stream-settings-input" maxlength="200">

            <label class="stream-settings-label" data-i18n="stream.description">Description</label>
            <textarea id="stream-settings-desc" class="stream-settings-input stream-settings-textarea" maxlength="1000" rows="3"></textarea>

            <div class="stream-settings-toggles">
                <div class="stream-toggle-row">
                    <span data-i18n="stream.allowReactions">Allow Reactions</span>
                    <label class="stream-toggle">
                        <input type="checkbox" id="stream-settings-reactions" checked>
                        <span class="stream-toggle-slider"></span>
                    </label>
                </div>

                <div class="stream-toggle-row">
                    <span data-i18n="stream.confirmStart">Подтверждение перед стартом</span>
                    <label class="stream-toggle">
                        <input type="checkbox" id="stream-settings-confirm-start" checked>
                        <span class="stream-toggle-slider"></span>
                    </label>
                </div>

                <div class="stream-toggle-row">
                    <span data-i18n="stream.autoAccept">Auto-accept speakers</span>
                    <label class="stream-toggle">
                        <input type="checkbox" id="stream-settings-auto-accept">
                        <span class="stream-toggle-slider"></span>
                    </label>
                </div>

                <div class="stream-toggle-row">
                    <span>Record stream</span>
                    <label class="stream-toggle">
                        <input type="checkbox" id="stream-settings-record">
                        <span class="stream-toggle-slider"></span>
                    </label>
                </div>

                <div class="stream-toggle-row">
                    <span data-i18n="stream.allowDonations">Allow Donations</span>
                    <label class="stream-toggle">
                        <input type="checkbox" id="stream-settings-donations" onchange="window._toggleStreamDonationSection()">
                        <span class="stream-toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div id="stream-donation-settings" class="stream-donation-settings" style="display:none;">
                <label class="stream-settings-label" data-i18n="stream.donationCard">Card Number</label>
                <input type="text" id="stream-settings-card" class="stream-settings-input" placeholder="0000 0000 0000 0000" maxlength="200">

                <label class="stream-settings-label" data-i18n="stream.donationMessage">Message for donors</label>
                <input type="text" id="stream-settings-card-message" class="stream-settings-input" maxlength="500">
            </div>

            <div class="stream-settings-divider"></div>

            <!-- Scheduled stream -->
            <div class="stream-toggle-row">
                <span data-i18n="stream.scheduled">Запланировать стрим</span>
                <label class="stream-toggle">
                    <input type="checkbox" id="stream-settings-scheduled" onchange="window._toggleStreamScheduleSection()">
                    <span class="stream-toggle-slider"></span>
                </label>
            </div>
            <div id="stream-schedule-settings" style="display:none;">
                <label class="stream-settings-label" data-i18n="stream.scheduledDate">Дата и время начала</label>
                <div style="display:flex;gap:8px;">
                    <input type="date" id="stream-settings-date" class="stream-settings-input" style="flex:1;color-scheme:dark;">
                    <input type="time" id="stream-settings-time" class="stream-settings-input" style="width:100px;color-scheme:dark;">
                </div>
            </div>

            <!-- Waiting screen background -->
            <div class="stream-settings-divider"></div>
            <label class="stream-settings-label" data-i18n="stream.waitingBg">Фон заставки</label>
            <div class="stream-bg-options" id="stream-bg-options">
                <button type="button" class="stream-bg-opt active" data-bg="gradient-1" onclick="window._selectStreamBg(this)" style="background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)"></button>
                <button type="button" class="stream-bg-opt" data-bg="gradient-2" onclick="window._selectStreamBg(this)" style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)"></button>
                <button type="button" class="stream-bg-opt" data-bg="gradient-3" onclick="window._selectStreamBg(this)" style="background:linear-gradient(135deg,#141e30,#243b55)"></button>
                <button type="button" class="stream-bg-opt" data-bg="gradient-4" onclick="window._selectStreamBg(this)" style="background:linear-gradient(135deg,#0a0a14,#1a0e2e,#2d1b69)"></button>
                <button type="button" class="stream-bg-opt" data-bg="gradient-5" onclick="window._selectStreamBg(this)" style="background:linear-gradient(135deg,#200122,#6f0000)"></button>
            </div>
        </div>

        <div class="stream-settings-footer">
            <button class="btn btn-ghost" onclick="document.getElementById('stream-settings-modal').classList.remove('show')" data-i18n="app.cancel">Cancel</button>
            <button class="btn btn-primary" onclick="startStream()" data-i18n="stream.goLive">Go Live</button>
        </div>
    </div>
</div>

<!-- Confirm Start Modal -->
<div id="stream-confirm-modal" class="modal-overlay stream-settings-modal" style="z-index:310;">
    <div class="stream-settings-content" style="max-width:360px;">
        <div class="stream-settings-header">
            <span data-i18n="stream.confirmStartTitle">Подтверждение</span>
            <button class="stream-settings-close" onclick="document.getElementById('stream-confirm-modal').classList.remove('show')">&times;</button>
        </div>
        <div class="stream-settings-body" style="text-align:center;padding:24px 16px;">
            <div style="font-size:40px;margin-bottom:12px;">🔴</div>
            <div style="font-size:14px;color:var(--text);margin-bottom:8px;" data-i18n="stream.confirmStartMessage">Вы уверены что хотите начать стрим?</div>
            <div style="font-size:12px;color:var(--text2);" data-i18n="stream.confirmStartHint">Все подписчики канала получат уведомление</div>
        </div>
        <div class="stream-settings-footer" style="justify-content:center;gap:12px;">
            <button class="btn btn-ghost" onclick="document.getElementById('stream-confirm-modal').classList.remove('show')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="document.getElementById('stream-confirm-modal').classList.remove('show'); window._confirmedStartStream()" data-i18n="stream.goLive">Начать стрим</button>
        </div>
    </div>
</div>

<!-- Donate Modal -->
<div id="stream-donate-modal" class="modal-overlay stream-donate-modal">
    <div class="stream-donate-content">
        <div class="stream-donate-header">
            <span data-i18n="stream.donate">Donate</span>
            <button onclick="window._hideDonateModal()">&times;</button>
        </div>
        <div class="stream-donate-body">
            <div id="stream-donate-card-info" class="stream-donate-card" style="display:none;"></div>
            <div id="stream-donate-card-msg" class="stream-donate-card-msg"></div>
            <label data-i18n="stream.amount">Amount</label>
            <input type="text" id="stream-donate-amount" class="stream-settings-input" placeholder="100">
            <label data-i18n="stream.donateMessage">Message</label>
            <input type="text" id="stream-donate-message" class="stream-settings-input" maxlength="300" placeholder="">
        </div>
        <div class="stream-donate-footer">
            <button class="btn btn-primary" onclick="sendStreamDonation()" data-i18n="stream.sendDonate">Send</button>
        </div>
    </div>
</div>

<!-- Hidden audio container -->
<div id="stream-audio-container" style="display:none;"></div>
