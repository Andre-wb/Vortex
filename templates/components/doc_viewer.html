<!-- Document Viewer — PDF (iframe) / TXT,Code (pre) -->
<div id="doc-viewer-overlay" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:8px;">
            <div id="doc-viewer-icon" style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;"></div>
            <span id="doc-viewer-title" style="font-size:14px;font-weight:600;color:var(--text);"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <a id="doc-viewer-dl" href="#" download style="color:var(--accent);font-size:12px;text-decoration:none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </a>
            <button onclick="window._closeDocViewer()" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>
    <div id="doc-viewer-content" style="flex:1;overflow:auto;"></div>
</div>
