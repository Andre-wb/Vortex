<div id="thread-panel" class="thread-panel">
    <div class="thread-panel-header">
        <div class="thread-panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/>
            </svg>
            <span id="thread-title" data-i18n="chat.thread">Тред</span>
        </div>
        <button class="thread-panel-close" onclick="closeThread()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                <path d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z"/>
            </svg>
        </button>
    </div>
    <div id="thread-messages" class="thread-messages"></div>
    <div class="thread-input-area">
        <button class="input-btn" onclick="document.getElementById('file-input')?.click()" title="Attach" style="width:32px;height:32px;min-width:32px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24" style="transform:rotate(-45deg)">
                <path d="M17 5H9c-3.86 0-7 3.14-7 7s3.14 7 7 7h9v-2H9c-2.76 0-5-2.24-5-5s2.24-5 5-5h8c.79 0 1.54.31 2.11.89a2.967 2.967 0 0 1 .01 4.23 3 3 0 0 1-2.12.89H9c-.26 0-.5-.11-.7-.3-.19-.2-.3-.44-.3-.7s.11-.51.3-.7.44-.3.7-.3h8v-2H9c-.79 0-1.54.32-2.11.89S6 11.22 6 12.01s.31 1.54.89 2.11c.57.57 1.32.89 2.11.89h8c1.32 0 2.58-.52 3.53-1.47S22 11.34 22 10.01s-.52-2.58-1.47-3.53a4.95 4.95 0 0 0-3.52-1.47Z"/>
            </svg>
        </button>
        <textarea id="thread-input" rows="1" placeholder="Reply in thread..." data-i18n-placeholder="chat.replyInThread" aria-label="Reply in thread"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendThreadReply();}"></textarea>
        <button class="input-btn send" onclick="sendThreadReply()" title="Send" data-i18n-title="chat.send" style="width:32px;height:32px;min-width:32px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<div class="modal-overlay" id="create-room-modal" role="dialog" aria-modal="true" aria-label="Создать комнату">
    <div class="modal">
        <div class="modal-title">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                  fill="currentColor" viewBox="0 0 24 24" >
                <path d="M12 2C6.49 2 2 6.49 2 12c0 2.12.68 4.19 1.93 5.9l-1.75 2.53c-.21.31-.24.7-.06 1.03.17.33.51.54.89.54h9c5.51 0 10-4.49 10-10S17.51 2 12 2m0 18H4.91L6 18.43c.26-.37.23-.88-.06-1.22A7.98 7.98 0 0 1 4.01 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8Z"></path>
            </svg>
            <div data-i18n="nav.newRoom">
                Новая комната
            </div>
        </div>
        <div id="cr-alert" class="alert"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="room.name">Название</label>
            <input class="form-input" id="cr-name" placeholder="Моя комната" data-i18n-placeholder="room.namePlaceholder">
        </div>
        <div class="form-group">
            <label class="form-label" data-i18n="room.description">Описание</label>
            <input class="form-input" id="cr-desc" placeholder="О чём эта комната?" data-i18n-placeholder="room.descPlaceholder">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="cr-private" style="width:18px;height:18px;accent-color:var(--accent);">
            <label for="cr-private" style="font-size:13px;cursor:pointer;" data-i18n="room.private">Приватная (только по коду)</label>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('create-room-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="createRoom()" data-i18n="app.create">Создать</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="create-channel-modal" role="dialog" aria-modal="true" aria-label="Создать канал">
    <div class="modal">
        <div class="modal-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                 fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
            <div data-i18n="nav.newChannel">
                Новый канал
            </div>
        </div>
        <div id="ch-alert" class="alert"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="channel.name">Название канала</label>
            <input class="form-input" id="ch-name" placeholder="Мой канал" data-i18n-placeholder="channel.namePlaceholder">
        </div>
        <div class="form-group">
            <label class="form-label" data-i18n="room.description">Описание</label>
            <input class="form-input" id="ch-desc" placeholder="О чём этот канал?" data-i18n-placeholder="channel.descPlaceholder">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="ch-private" style="width:18px;height:18px;accent-color:var(--accent);">
            <label for="ch-private" style="font-size:13px;cursor:pointer;" data-i18n="channel.private">Приватный (только по коду)</label>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('create-channel-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="createChannel()" data-i18n="app.create">Создать</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="join-modal" role="dialog" aria-modal="true" aria-label="Присоединиться к комнате">
    <div class="modal">
        <div class="modal-title">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                  fill="currentColor" viewBox="0 0 24 24" >
                <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2m5.66 4.35c-.72.17-1.45.3-2.19.4-.18-.83-.42-1.59-.7-2.25a8.05 8.05 0 0 1 2.89 1.85M12 20c-.31 0-.97-1-1.45-2.94.96-.05 1.93-.05 2.9 0C12.97 19 12.31 20 12 20m-1.81-4.93c-.08-.63-.14-1.32-.17-2.07h3.96c-.03.75-.09 1.44-.17 2.07-1.2-.08-2.42-.08-3.62 0M12 4c.31 0 .97 1 1.45 2.94-.96.05-1.93.05-2.9 0C11.03 5 11.69 4 12 4m0 5c.61 0 1.21-.03 1.81-.06.08.63.14 1.32.17 2.06h-3.96c.03-.75.09-1.43.17-2.06.6.04 1.2.06 1.81.06m-3.98 2H4.07c.13-1.05.47-2.04.97-2.92 1.03.28 2.09.51 3.16.66-.09.74-.15 1.5-.18 2.27Zm0 2c.03.77.09 1.53.18 2.27-1.08.15-2.13.38-3.16.65-.5-.88-.84-1.87-.97-2.93h3.95Zm7.96 0h3.95a8 8 0 0 1-.97 2.93c-1.03-.28-2.09-.5-3.16-.65.09-.74.15-1.51.18-2.27Zm0-2c-.03-.76-.09-1.53-.18-2.27 1.08-.15 2.13-.38 3.16-.66.5.88.83 1.87.97 2.92h-3.95ZM9.24 4.5c-.28.66-.52 1.43-.7 2.25-.74-.1-1.47-.24-2.19-.4.81-.81 1.8-1.44 2.89-1.85M6.35 17.65c.72-.17 1.45-.3 2.19-.4.18.83.42 1.59.7 2.25a8.05 8.05 0 0 1-2.89-1.85m8.42 1.85c.28-.66.52-1.43.7-2.25.74.1 1.47.24 2.19.4-.81.81-1.8 1.44-2.89 1.85"></path>
            </svg>
            <div data-i18n="nav.joinByCode">
                Вступить по коду
            </div>
        </div>
        <div id="join-alert" class="alert"></div>
        <div class="form-group">
            <label class="form-label" data-i18n="room.inviteCode">Invite-код (8 символов)</label>
            <input class="form-input" id="join-code" placeholder="ABCD1234"
                   style="text-transform:uppercase;letter-spacing:3px;font-size:18px;text-align:center;"
                   maxlength="8" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('join-modal')" data-i18n="app.cancel">Отмена</button>
            <button class="btn btn-primary" onclick="joinRoom()" data-i18n="room.join">→ Вступить</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="members-modal" role="dialog" aria-modal="true" aria-label="Участники комнаты">
    <div class="modal">
        <div class="modal-title">
            <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                  fill="currentColor" viewBox="0 0 24 24" >
                <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2m5.66 4.35c-.72.17-1.45.3-2.19.4-.18-.83-.42-1.59-.7-2.25a8.05 8.05 0 0 1 2.89 1.85M12 20c-.31 0-.97-1-1.45-2.94.96-.05 1.93-.05 2.9 0C12.97 19 12.31 20 12 20m-1.81-4.93c-.08-.63-.14-1.32-.17-2.07h3.96c-.03.75-.09 1.44-.17 2.07-1.2-.08-2.42-.08-3.62 0M12 4c.31 0 .97 1 1.45 2.94-.96.05-1.93.05-2.9 0C11.03 5 11.69 4 12 4m0 5c.61 0 1.21-.03 1.81-.06.08.63.14 1.32.17 2.06h-3.96c.03-.75.09-1.43.17-2.06.6.04 1.2.06 1.81.06m-3.98 2H4.07c.13-1.05.47-2.04.97-2.92 1.03.28 2.09.51 3.16.66-.09.74-.15 1.5-.18 2.27Zm0 2c.03.77.09 1.53.18 2.27-1.08.15-2.13.38-3.16.65-.5-.88-.84-1.87-.97-2.93h3.95Zm7.96 0h3.95a8 8 0 0 1-.97 2.93c-1.03-.28-2.09-.5-3.16-.65.09-.74.15-1.51.18-2.27Zm0-2c-.03-.76-.09-1.53-.18-2.27 1.08-.15 2.13-.38 3.16-.66.5.88.83 1.87.97 2.92h-3.95ZM9.24 4.5c-.28.66-.52 1.43-.7 2.25-.74-.1-1.47-.24-2.19-.4.81-.81 1.8-1.44 2.89-1.85M6.35 17.65c.72-.17 1.45-.3 2.19-.4.18.83.42 1.59.7 2.25a8.05 8.05 0 0 1-2.89-1.85m8.42 1.85c.28-.66.52-1.43.7-2.25.74.1 1.47.24 2.19.4-.81.81-1.8 1.44-2.89 1.85"></path>
            </svg>

            <div data-i18n="chat.members">
                Участники
            </div>
        </div>
        <div id="members-list" style="max-height:300px;overflow-y:auto;"></div>
        <!-- Add bot to room -->
        <div id="add-bot-to-room-section" style="margin-top:12px;">
            <button class="btn btn-secondary" onclick="showAddBotToRoom()" style="width:100%;font-size:12px;" data-i18n="room.addBot">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px;"><path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7 13H6v-2h1v2zm5 4c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2zm4-4h-1v-2h1v2zm-6-2v-2h4v2h-4z"/></svg>
                Добавить бота в комнату
            </button>
            <div id="add-bot-to-room-list" style="display:none;margin-top:8px;max-height:150px;overflow-y:auto;"></div>
        </div>
        <div style="margin-top:16px;padding:12px;background:var(--bg3);border-radius:var(--radius);font-family:var(--mono);font-size:12px;">
            <div style="color:var(--text2);margin-bottom:4px;" data-i18n="room.inviteCodeLabel">Invite-код комнаты:</div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span id="modal-invite-code" style="font-size:16px;letter-spacing:3px;font-weight:700;color:var(--accent2);">—</span>
                <button class="btn btn-secondary btn-sm" onclick="copyInviteCode()">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          fill="currentColor" viewBox="0 0 24 24" >
                        <path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2m5.66 4.35c-.72.17-1.45.3-2.19.4-.18-.83-.42-1.59-.7-2.25a8.05 8.05 0 0 1 2.89 1.85M12 20c-.31 0-.97-1-1.45-2.94.96-.05 1.93-.05 2.9 0C12.97 19 12.31 20 12 20m-1.81-4.93c-.08-.63-.14-1.32-.17-2.07h3.96c-.03.75-.09 1.44-.17 2.07-1.2-.08-2.42-.08-3.62 0M12 4c.31 0 .97 1 1.45 2.94-.96.05-1.93.05-2.9 0C11.03 5 11.69 4 12 4m0 5c.61 0 1.21-.03 1.81-.06.08.63.14 1.32.17 2.06h-3.96c.03-.75.09-1.43.17-2.06.6.04 1.2.06 1.81.06m-3.98 2H4.07c.13-1.05.47-2.04.97-2.92 1.03.28 2.09.51 3.16.66-.09.74-.15 1.5-.18 2.27Zm0 2c.03.77.09 1.53.18 2.27-1.08.15-2.13.38-3.16.65-.5-.88-.84-1.87-.97-2.93h3.95Zm7.96 0h3.95a8 8 0 0 1-.97 2.93c-1.03-.28-2.09-.5-3.16-.65.09-.74.15-1.51.18-2.27Zm0-2c-.03-.76-.09-1.53-.18-2.27 1.08-.15 2.13-.38 3.16-.66.5.88.83 1.87.97 2.92h-3.95ZM9.24 4.5c-.28.66-.52 1.43-.7 2.25-.74-.1-1.47-.24-2.19-.4.81-.81 1.8-1.44 2.89-1.85M6.35 17.65c.72-.17 1.45-.3 2.19-.4.18.83.42 1.59.7 2.25a8.05 8.05 0 0 1-2.89-1.85m8.42 1.85c.28-.66.52-1.43.7-2.25.74.1 1.47.24 2.19.4-.81.81-1.8 1.44-2.89 1.85"></path>
                    </svg>
                    <div data-i18n="app.copy">
                        Скопировать
                    </div>
                </button>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('members-modal')" data-i18n="app.close">Закрыть</button>
            <button class="btn btn-danger" onclick="leaveRoom()" data-i18n="room.leave">Выйти из комнаты</button>
        </div>
    </div>
</div>
