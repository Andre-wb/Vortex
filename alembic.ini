# ══════════════════════════════════════════════════════════════════════════════
# Alembic Configuration — Vortex Chat Database Migrations
# ══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   alembic upgrade head          # Apply all pending migrations
#   alembic revision --autogenerate -m "description"  # Create new migration
#   alembic downgrade -1          # Rollback last migration
#   alembic history               # Show migration history
#   alembic current               # Show current revision
#
# ══════════════════════════════════════════════════════════════════════════════

[alembic]
script_location = alembic
prepend_sys_path = .

# SQLite database URL (overridden by env.py from Config)
sqlalchemy.url = sqlite:///vortex.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
