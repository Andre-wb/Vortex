<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vortex Demo</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">V</div>
            <h1>Vortex Messenger</h1>
            <p>Decentralized. Encrypted. Unstoppable.</p>
            <div class="features">
                <div class="feature" data-icon="1">E2E Encryption</div>
                <div class="feature" data-icon="2">P2P Federation</div>
                <div class="feature" data-icon="3">Zero Knowledge</div>
                <div class="feature" data-icon="4">Open Source</div>
            </div>
            <div class="counter-section">
                <button id="btn" onclick="increment()">Click me</button>
                <span id="count">0</span>
            </div>
            <div class="clock" id="clock"></div>
        </div>
        <div class="particles" id="particles"></div>
    </div>
</body>
</html>
