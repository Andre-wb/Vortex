<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gx-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="gx-text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Window body -->
  <rect x="4" y="4" width="92" height="92" rx="16" ry="16"
        fill="url(#gx-grad)"/>

  <!-- Title bar -->
  <rect x="4" y="4" width="92" height="28" rx="16" ry="16"
        fill="rgba(0,0,0,0.25)"/>
  <rect x="4" y="20" width="92" height="12"
        fill="rgba(0,0,0,0.25)"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="4" fill="#ff5f57" opacity="0.9"/>
  <circle cx="36" cy="18" r="4" fill="#febc2e" opacity="0.9"/>
  <circle cx="50" cy="18" r="4" fill="#28c840" opacity="0.9"/>

  <!-- GX monogram -->
  <text x="50" y="72"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        font-weight="800"
        fill="url(#gx-text-grad)"
        text-anchor="middle"
        letter-spacing="-1">GX</text>

  <!-- Cursor blink line -->
  <rect x="30" y="80" width="40" height="3" rx="1.5"
        fill="rgba(255,255,255,0.15)"/>
</svg>
