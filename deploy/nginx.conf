# ══════════════════════════════════════════════════════════════════════════════
# VORTEX Chat — Nginx Reverse Proxy Configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/vortex
#   2. ln -s /etc/nginx/sites-available/vortex /etc/nginx/sites-enabled/
#   3. Replace YOUR_DOMAIN with your actual domain
#   4. nginx -t && systemctl reload nginx
#
# ══════════════════════════════════════════════════════════════════════════════

upstream vortex_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

# ── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Limits ───────────────────────────────────────────────────────────
    client_max_body_size 110m;    # Slightly above MAX_FILE_MB
    client_body_timeout 120s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── WebSocket endpoints ──────────────────────────────────────────────
    location ~ ^/api/(chat|federation|voice)/ws {
        limit_conn ws_conn 10;
        proxy_pass http://vortex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth endpoints (stricter rate limit) ─────────────────────────────
    location /api/authentication/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── File uploads (rate limited) ──────────────────────────────────────
    location /api/files/ {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 110m;
    }

    # ── API endpoints ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────
    location /health {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Metrics (internal only) ──────────────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://vortex_backend;
    }

    # ── Static files (cached) ────────────────────────────────────────────
    location /static/ {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Uploads ──────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Service Worker (no cache) ────────────────────────────────────────
    location = /service-worker.js {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Everything else → app ────────────────────────────────────────────
    location / {
        proxy_pass http://vortex_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
