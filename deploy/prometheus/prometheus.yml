# ══════════════════════════════════════════════════════════════════════════════
# Prometheus configuration for Vortex Chat monitoring
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules
rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "vortex"
    static_configs:
      - targets: ["vortex:9000"]
        labels:
          instance: "vortex-node"
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
