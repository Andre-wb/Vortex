# Chaos Mesh — Network partition between Vortex and Redis
# Simulates Redis disconnect for 60 seconds
# Tests: graceful degradation to single-node mode
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: vortex-redis-partition
  namespace: vortex
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - vortex
    labelSelectors:
      app: vortex
  direction: both
  target:
    selector:
      namespaces:
        - vortex
      labelSelectors:
        app: redis
    mode: all
  duration: "60s"
