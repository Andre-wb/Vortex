name: Release Vortex Wizard

on:
  push:
    tags:
      - 'wizard-v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14              # Apple Silicon
            artifact: vortex-wizard-macos-arm64.zip
            platform: darwin
          - os: macos-13              # Intel
            artifact: vortex-wizard-macos-x64.zip
            platform: darwin
          - os: windows-latest
            artifact: vortex-wizard-windows-x64.zip
            platform: windows
          - os: ubuntu-22.04
            artifact: vortex-wizard-linux-x64.tar.gz
            platform: linux
    runs-on: ${{ matrix.os }}

    env:
      # Matrix values defined in THIS workflow are not user-controlled, but
      # we pipe them through env anyway so each `run:` step uses quoted
      # shell variables (the recommended safety pattern).
      ARTIFACT: ${{ matrix.artifact }}
      PLATFORM: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev gir1.2-webkit2-4.1 \
            libgtk-3-dev pkg-config

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r vortex_wizard/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller vortex_wizard/vortex-wizard.spec --noconfirm --clean

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Vortex Wizard.app" "$ARTIFACT"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar -czf "$ARTIFACT" vortex-wizard

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path vortex-wizard -DestinationPath $env:ARTIFACT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/wizard-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir release
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lah release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
